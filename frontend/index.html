// ── SHARE FLOW ─────────────────────────────────────────────────────────────
// Two things need to happen before we can render: data loaded + Google Maps ready
// We wait for both independently and render when both are ready.
var shareData=null;
var shareMapsReady=false;

function tryRenderShare(){
  if(shareData&&shareMapsReady){
    renderSharePage(shareData);
    shareData=null; // prevent double render
  }
}

// Check share param IMMEDIATELY on script load
(function(){
  var params=new URLSearchParams(window.location.search);
  // Check for invite links too (requires login but still suppress auth initially)
  var invite=params.get("invite");
  if(invite){window.history.replaceState({},"","/");setTimeout(function(){handleInvite(invite);},500);return;}

  var collabToken=params.get("collab");
  if(collabToken){
    window._pendingCollabToken=collabToken;
    window._isShareMode=true; // suppress auth screen — will check auth after load
    window.history.replaceState({},"","/");
    return;
  }

  var shortToken=params.get("s");
  var longShare=params.get("share");
  if(!shortToken&&!longShare)return;

  window._isShareMode=true;
  document.getElementById("authScreen").style.display="none";
  window.history.replaceState({},"","/");

  if(longShare){
    try{shareData=JSON.parse(decodeURIComponent(escape(atob(longShare))));}catch(e){}
    tryRenderShare();
  } else if(shortToken){
    // Fetch short link data from server
    fetch("https://roamy-backend.onrender.com/share/"+shortToken)
      .then(function(r){return r.json();})
      .then(function(result){
        if(result&&result.data){shareData=result.data;tryRenderShare();}
      })
      .catch(function(e){console.log("Share fetch error",e);});
  }
})();

function onGoogleMapsReady(){
  googleMapsReady=true;
  shareMapsReady=true;
  tryRenderShare();
  // Handle pending collab link
  if(window._pendingCollabToken){
    var ct=window._pendingCollabToken;window._pendingCollabToken=null;
    if(authToken){openCollabPage(ct);}else{showAuthScreen();}
    return;
  }
  if(!window._isShareMode){
    if(pendingMapInit){initMap();}
    var params=new URLSearchParams(window.location.search);
    var sharedInput=params.get("url")||params.get("text")||params.get("title");
    if(sharedInput&&sharedInput.trim()){
      window.history.replaceState({},"","/");
      setTimeout(function(){document.getElementById("addInput").value=sharedInput.trim();doAdd();},800);
    }
  }
}

var currentShareData=null;

function renderSharePage(data){
  if(!data||!data.p||!data.p.length)return;
  currentShareData=data;
  var sp=document.getElementById("sharePage");
  // Hero
  var cover=data.p.find(function(p){return p.ph;});
  var bg=document.getElementById("shareHeroBg");
  if(cover){bg.style.backgroundImage="url("+cover.ph+")";}
  else{bg.style.background=data.c||"#2563EB";}
  document.getElementById("shareEmoji").textContent=data.e||"🗺️";
  document.getElementById("shareName").textContent=data.n||"Travel Collection";
  var countries={};data.p.forEach(function(p){if(p.co)countries[p.co]=1;});
  document.getElementById("shareMeta").textContent=data.p.length+" places · "+Object.keys(countries).length+" countries";
  // Places list
  document.getElementById("sharePlaces").innerHTML=data.p.map(function(p){
    var thumb=p.ph?'<div class="share-place-thumb"><img src="'+p.ph+'" onerror="this.parentElement.innerHTML=\'<div class=share-place-thumb-emo>'+emo(p.t)+'</div>\'"/></div>':'<div class="share-place-thumb"><div class="share-place-thumb-emo">'+emo(p.t)+'</div></div>';
    return'<div class="share-place-card">'+thumb+'<div class="share-place-info"><div class="share-place-name">'+p.n+'</div><div class="share-place-sub">'+[p.ci,p.co].filter(Boolean).join(", ")+'</div></div></div>';
  }).join('');
  // Google Maps URL
  var mapsUrl;
  if(data.p.length===1){
    mapsUrl="https://www.google.com/maps/search/?api=1&query="+data.p[0].la+","+data.p[0].lo;
  } else {
    mapsUrl="https://www.google.com/maps/dir/"+data.p.filter(function(p){return p.la&&p.lo;}).map(function(p){return p.la+","+p.lo;}).join("/");
  }
  document.getElementById("shareGmapsBtn").href=mapsUrl;
  // Show save or login button
  var saveBtn=document.getElementById("shareSaveBtn");
  var loginBtn=document.getElementById("shareLoginBtn");
  if(saveBtn)saveBtn.style.display=authToken?"flex":"none";
  if(loginBtn)loginBtn.style.display=authToken?"none":"flex";
  sp.classList.add("open");
  if(googleMapsReady){initShareMap(data.p);}
}

function saveSharedCollection(){
  if(!currentShareData||!authToken)return;
  var data=currentShareData;
  var colId="col"+Date.now();
  var newCol={id:colId,name:data.n,emoji:data.e||"🗺️",color:"#2563EB",placeIds:[],sections:[],sectionMap:{},createdAt:new Date().toISOString(),aiCover:null};
  var newPlaces=data.p.map(function(p){
    var id="sp"+Date.now()+Math.random().toString(36).slice(2,6);
    newCol.placeIds.push(id);
    return{id:id,name:p.n,type:p.t||"default",lat:p.la,lng:p.lo,city:p.ci,country:p.co,photoUrl:p.ph||null,rating:p.r||null,visited:false,addedAt:new Date().toISOString()};
  });
  newPlaces.forEach(function(p){places.unshift(p);});
  collections.push(newCol);
  try{localStorage.setItem("hoplist_v8",JSON.stringify({places,collections}));}catch(e){}
  fetch(BACKEND+"/sync",{method:"POST",headers:authHeaders(),body:JSON.stringify({places,collections})}).catch(function(){});
  document.getElementById("sharePage").classList.remove("open");
  document.querySelectorAll(".nav-btn").forEach(function(b){b.classList.remove("active");});
  document.querySelectorAll(".page").forEach(function(pg){pg.classList.remove("active");});
  document.querySelector('[data-page="collectionsPage"]').classList.add("active");
  document.getElementById("collectionsPage").classList.add("active");
  renderCollections();renderList();
  showToast("save","ts",'"'+data.n+'" saved!',newPlaces.length+" places added to your collections");
  setTimeout(function(){openColDetail(colId);},600);
  setTimeout(function(){generateCoverForCol(colId);},1000);
}

function getFiltered(){
  var f=places.filter(function(p){return tab==="visited"?p.visited:tab==="wishlist"?!p.visited:true;});
  if(search.trim()){var q=search.toLowerCase();f=f.filter(function(p){return(p.name||"").toLowerCase().includes(q)||(p.city||"").toLowerCase().includes(q)||(p.country||"").toLowerCase().includes(q);});}
  return f;
}
function getGrouped(f){return f.reduce(function(acc,p){var c=p.country||"Unknown";var ci=p.city||"Other";if(!acc[c])acc[c]={};if(!acc[c][ci])acc[c][ci]=[];acc[c][ci].push(p);return acc;},{});}

function renderStats(){
  var total=places.length;var vis=places.filter(function(p){return p.visited;}).length;
  var countries=Object.keys(places.reduce(function(a,p){a[p.country||"?"]=1;return a;},{})).length;
  document.getElementById("hsSaved").textContent=total;document.getElementById("hsVisited").textContent=vis;document.getElementById("hsCountries").textContent=countries;
}

    return'<div class="col-picker-item'+(sel?" in-col":"")+'" onclick="colPickerToggleMulti(\''+col.id+'\')">'+
      '<div class="col-picker-emoji" style="background:'+col.color+'20">'+col.emoji+'</div>'+

  enableSwipeDismiss("addToColModal",function(){document.getElementById("addToColModal")?.remove();});
}
function colPickerToggleMulti(colId){
  colPickerState[colId]=!colPickerState[colId];
  var items=document.querySelectorAll("#addToColModal .col-picker-item");
  var idx=collections.findIndex(function(c){return c.id===colId;});
  if(idx>=0&&items[idx]){items[idx].classList.toggle("in-col",colPickerState[colId]);var ch=items[idx].querySelector(".col-picker-check");if(ch)ch.textContent=colPickerState[colId]?"✓":"";}
}
function saveColPickerMulti(placeIds){
  if(!placeIds||!placeIds.length){document.getElementById("addToColModal")?.remove();return;}
  var added=[];
  collections=collections.map(function(col){
    if(!colPickerState[col.id])return col;
    added.push(col.id);
    return Object.assign({},col,{placeIds:[...new Set([...(col.placeIds||[]),...placeIds])]});
  });
  document.getElementById("addToColModal")?.remove();
  try{localStorage.setItem("hoplist_v8",JSON.stringify({places,collections}));}catch(e){}
  if(authToken){clearTimeout(syncTimeout);pushToServer();}
  renderList();renderCollections();
  showToast("col","ts","Added to "+added.length+" collection"+(added.length!==1?"s":"")+"!",placeIds.length+" places");
  exitSelectMode();
  added.forEach(function(colId){setTimeout(function(){generateCoverForCol(colId);},500);});
}

function renderList(){
  renderStats();
  var list=document.getElementById("placeList");
  var f=getFiltered();var g=getGrouped(f);
  if(f.length===0){
    var ex=(tab==="all"&&!search)?'<div class="empty-examples">'+EXAMPLES.map(function(e){return'<button class="ex-btn" onclick="quickAdd(\''+e.v+'\')">'+e.l+'</button>';}).join("")+"</div>":"";
    list.innerHTML='<div class="empty"><div class="empty-icon">🌍</div><div class="empty-title">'+(search?"No results":tab==="all"?"Start exploring":"No "+tab+" places")+'</div><div class="empty-sub">'+(search?"Try a different search":tab==="all"?"Paste any link or type a destination":"Mark places as "+tab)+'</div>'+ex+'</div>';
    return;
  }
  list.innerHTML=Object.entries(g).map(function(entry){
    var country=entry[0];var cities=entry[1];
    var cnt=Object.values(cities).flat().length;var open=!collapsed[country];
    return'<div class="country-group"><div class="country-hdr" onclick="toggleCol2(\''+country+'\')"><div class="c-left"><span class="c-flag">'+flag(country)+'</span><span class="c-name">'+country+'</span><span class="c-count">'+cnt+'</span></div><span class="c-chev'+(open?" open":"")+'" >▾</span></div>'+
    (open?Object.entries(cities).map(function(ce){
      var city=ce[0];var ps=ce[1];
      return'<div class="city-sec"><div class="city-lbl">'+city+'</div>'+
        ps.map(function(p){
          var thumb=p.photoUrl?'<div class="pthumb"><img src="'+p.photoUrl+'" onerror="this.parentElement.innerHTML=\'<div class=pthumb-emo>'+emo(p.type)+'</div>\'" loading="lazy"/></div>':'<div class="pthumb"><div class="pthumb-emo">'+emo(p.type)+'</div></div>';
          var rating=p.rating?'<span class="prating">★ '+p.rating.toFixed(1)+'</span>':"";
          var vtag=p.visited?'<span class="pvis-tag">Visited</span>':"";
          var notePrev=p.notes?'<div style="font-size:11.5px;color:var(--amber);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">📝 '+p.notes+'</div>':"";
          // Which collections has this place
          var colCount=collections.filter(function(c){return(c.placeIds||[]).includes(p.id);}).length;
          var colTag=colCount?'<span style="font-size:10px;color:#7C3AED;background:#EDE9FE;padding:2px 7px;border-radius:20px;font-weight:600">🗂 '+colCount+'</span>':"";
          return'<div class="pcard'+(selectMode&&selectedIds[p.id]?" selected":"")+'" id="card-'+p.id+'">'+
            '<div class="pcard-main" '+
            'onclick="selectMode?toggleSelectId(\''+p.id+'\'):openSheet(\''+p.id+'\')" '+
            'oncontextmenu="event.preventDefault();enterSelectMode(\''+p.id+'\')" '+
            'ontouchstart="startLongPress(\''+p.id+'\',event)" '+
            'ontouchend="clearLongPress()" '+
            'ontouchmove="clearLongPress()">'+
            (selectMode?'<div class="pselect-circle">'+(selectedIds[p.id]?"✓":"")+'</div>':"")+
            thumb+
            '<div class="pinfo"><div class="pname">'+p.name+'</div><div class="pmeta"><span class="ptype-tag">'+emo(p.type)+' '+(p.type||'place')+'</span>'+rating+vtag+colTag+'</div>'+notePrev+'</div>'+
            '<span class="pchev">›</span></div>'+
            '<div class="pcard-actions">'+
            '<button class="pact vis'+(p.visited?" on":"")+'" onclick="toggleVis(\''+p.id+'\',event)">'+(p.visited?"✓ Visited":"☐ Unvisited")+'</button>'+
            '<button class="pact map" onclick="goToMap(\''+p.id+'\')">🗺 Map</button>'+
            '<button class="pact col" onclick="openAddToCol(\''+p.id+'\')">🗂 Collect</button>'+
            '<button class="pact del" onclick="askDelete(\''+p.id+'\')">🗑 Remove</button>'+
            '</div>'+
            '<div class="pcard-confirm" id="confirm-'+p.id+'"><span class="confirm-text">Remove this place?</span><div class="confirm-btns"><button class="cbtn no" onclick="cancelDelete(\''+p.id+'\')">Cancel</button><button class="cbtn yes" onclick="confirmDelete(\''+p.id+'\')">Yes, Remove</button></div></div>'+
            '</div>';
        }).join("")+'</div>';
    }).join(""):"")+'</div>';
  }).join("");
}

function startLongPress(id,e){
  clearLongPress();
  longPressTimer=setTimeout(function(){
    longPressTimer=null;
    navigator.vibrate&&navigator.vibrate(30);
    enterSelectMode(id);
  },450);
}
function clearLongPress(){
  if(longPressTimer){clearTimeout(longPressTimer);longPressTimer=null;}
}
var longPressTimer=null;

function toggleCol2(c){collapsed[c]=!collapsed[c];renderList();}
function toggleVis(id,e){if(e)e.stopPropagation();places=places.map(function(p){return p.id===id?Object.assign({},p,{visited:!p.visited}):p;});save();renderList();if(mapInited)renderMapMarkers();}
function askDelete(id){document.querySelectorAll(".pcard-confirm.show").forEach(function(el){el.classList.remove("show");});var el=document.getElementById("confirm-"+id);if(el)el.classList.add("show");}
function cancelDelete(id){var el=document.getElementById("confirm-"+id);if(el)el.classList.remove("show");}
function confirmDelete(id){
  places=places.filter(function(p){return p.id!==id;});
  collections=collections.map(function(c){return Object.assign({},c,{placeIds:(c.placeIds||[]).filter(function(pid){return pid!==id;})});});
  if(mapInited&&markers[id]){markers[id].map=null;delete markers[id];}
  try{localStorage.setItem("hoplist_v8",JSON.stringify({places,collections}));}catch(e){}
  renderList();if(mapInited)renderMapStats();
  // Delete from server
  if(authToken){
    fetch(BACKEND+"/places/"+id,{method:"DELETE",headers:authHeaders()}).catch(function(){});
  }
}
function goToMap(id){
  var p=places.find(function(x){return x.id===id;});if(!p)return;
  document.querySelectorAll(".nav-btn").forEach(function(b){b.classList.remove("active");});
  document.querySelectorAll(".page").forEach(function(pg){pg.classList.remove("active");});
  document.querySelector('[data-page="mapPage"]').classList.add("active");
  document.getElementById("mapPage").classList.add("active");
  if(!googleMapsReady){pendingMapInit=true;return;}
  if(!mapInited)initMap();else{google.maps.event.trigger(map,"resize");}
  renderMapMarkers();
  if(p.lat&&p.lng)setTimeout(function(){map.panTo({lat:p.lat,lng:p.lng});map.setZoom(15);},300);
}
function quickAdd(val){document.getElementById("addInput").value=val;doAdd();}

// TABS & SEARCH
document.querySelectorAll(".htab").forEach(function(t){t.addEventListener("click",function(){document.querySelectorAll(".htab").forEach(function(x){x.classList.remove("active");});t.classList.add("active");tab=t.dataset.tab;renderList();});});
document.getElementById("searchInput").addEventListener("input",function(e){search=e.target.value;renderList();});

// ── SHEET ──────────────────────────────────────────────────────────────────

function buildCatEditor(id,currentType){
  var grid=ALL_CATS.map(function(c){var color=getCatColor(c.k);var sel=c.k===currentType?' selected" style="background:'+color:'"';return'<button class="cat-opt'+sel+'" onclick="selectCat(\''+id+'\',\''+c.k+'\')">'+c.l+'</button>';}).join('');
  return'<div class="cat-editor"><div class="cat-editor-label">🏷 Change Category</div><div class="cat-grid">'+grid+'</div><div class="cat-custom-row"><input class="cat-custom-input" id="catCustom-'+id+'" placeholder="Custom category…"/><button class="cat-save-btn" onclick="saveCustomCat(\''+id+'\')">Add</button></div></div>';
}
function toggleCatEditor(id){var el=document.getElementById('catEditor-'+id);if(el)el.style.display=el.style.display==='none'?'block':'none';}
function selectCat(id,cat){places=places.map(function(p){return p.id===id?Object.assign({},p,{type:cat}):p;});save();closeSheet();openSheet(id);if(mapInited)renderMapMarkers();}
function saveCustomCat(id){var input=document.getElementById('catCustom-'+id);if(!input)return;var val=input.value.trim().toLowerCase();if(!val)return;selectCat(id,val);}

function openSheet(id){
  var p=places.find(function(x){return x.id===id;});if(!p)return;
  var ex=document.getElementById("sheetOverlay");if(ex)ex.remove();
  var photoHtml=p.photoUrl?'<img class="sheet-photo" src="'+p.photoUrl+'" onerror="this.outerHTML=\'<div class=sheet-photo-emo>'+emo(p.type)+'</div>\'"/>':"<div class=\"sheet-photo-emo\">"+emo(p.type)+"</div>";
  var pills='<span class="spill type" onclick="toggleCatEditor(\''+p.id+'\')" title="Change category">'+emo(p.type)+' '+(p.type||'place')+' ✏️</span>';
  if(p.rating)pills+='<span class="spill rat">★ '+p.rating.toFixed(1)+' <span style="font-weight:400;font-size:10.5px">('+((p.totalRatings||0).toLocaleString())+')</span></span>';
  if(p.openNow!==null&&p.openNow!==undefined)pills+='<span class="spill '+(p.openNow?'open':'closed')+'">'+(p.openNow?'Open now':'Closed')+'</span>';
  if(p.priceLevel)pills+='<span class="spill price">'+priceStr(p.priceLevel)+'</span>';
  var mapsUrl="https://www.google.com/maps/search/"+encodeURIComponent([p.name,p.city,p.country].filter(Boolean).join(" "));
  var websiteBtn=p.website?'<a class="sact sec" href="'+p.website+'" target="_blank">🌐 Website</a>':'';
  var colsForPlace=collections.filter(function(c){return(c.placeIds||[]).includes(p.id);});
  var colTag=colsForPlace.length?'<div style="margin-bottom:12px;font-size:12.5px;color:#7C3AED;">🗂 In: '+colsForPlace.map(function(c){return c.emoji+' '+c.name;}).join(', ')+'</div>':'';
  var html='<div class="sheet-overlay" id="sheetOverlay" onclick="closeSheetOutside(event)"><div class="sheet">'+
    '<div id="sheetHandleZone" style="padding:8px 0 4px;touch-action:none;cursor:grab;display:flex;justify-content:center;"><div class="sheet-handle"></div></div>'+photoHtml+
    '<div class="sheet-body">'+
    '<div class="sheet-top"><div class="sheet-name">'+p.name+'</div><button class="sheet-x" onclick="closeSheet()">✕</button></div>'+
    '<div class="sheet-pills">'+pills+'</div>'+
    '<div id="catEditor-'+p.id+'" style="display:none;margin-bottom:14px;">'+buildCatEditor(p.id,p.type)+'</div>'+
    colTag+
    '<div class="sheet-addr"><span>📍</span><span>'+(p.address||[p.city,p.country].filter(Boolean).join(', '))+'</span></div>'+
    (p.description?'<div class="sheet-desc">'+p.description+'</div>':'')+
    '<div class="notes-section">'+
    (p.notes
      ?'<div class="notes-display-label">📝 Your note</div><div class="notes-display" onclick="editNote(\''+p.id+'\')">'+p.notes.replace(/</g,'&lt;').replace(/>/g,'&gt;')+'<div style="margin-top:6px;font-size:11px;color:var(--gray-400)">Tap to edit</div></div>'
      :'<div class="notes-label">📝 Add a note</div><textarea class="notes-textarea" id="noteInput-'+p.id+'" placeholder="Why you want to visit, who recommended it, best time to go…"></textarea><button class="notes-save-btn" onclick="saveNote(\''+p.id+'\')">Save Note</button>'
    )+
    '</div>'+
    '<div class="sheet-hr"></div>'+
    '<div class="sheet-acts">'+
    '<a class="sact primary" href="'+mapsUrl+'" target="_blank">🗺️ Open in Google Maps</a>'+
    '<div class="sact-row">'+
    '<button class="sact '+(p.visited?'suc':'sec')+' half" onclick="toggleVisSheet(\''+p.id+'\')">'+(p.visited?'✓ Visited':'Mark Visited')+'</button>'+
    '<button class="sact purple half" onclick="openAddToCol(\''+p.id+'\')">🗂️ Add to Collection</button>'+
    '</div>'+
    (websiteBtn?'<div class="sact-row">'+websiteBtn+'</div>':'')+
    '<div class="sheet-confirm" id="sheetConfirm"><div class="sc-text">Remove this place?</div><div class="sc-btns"><button class="sc-btn no" onclick="document.getElementById(\'sheetConfirm\').classList.remove(\'show\')">Cancel</button><button class="sc-btn yes" onclick="delFromSheet(\''+p.id+'\')">Yes, Remove</button></div></div>'+
    '<button class="sact dan" onclick="document.getElementById(\'sheetConfirm\').classList.add(\'show\')">🗑️ Remove place</button>'+
    '</div></div></div></div>';
  document.body.insertAdjacentHTML("beforeend",html);
  enableSwipeDismiss("sheetOverlay",closeSheet);
  pushBackState("sheet");
  if(mapInited&&p.lat&&p.lng){map.panTo({lat:p.lat,lng:p.lng});map.setZoom(Math.max(map.getZoom(),14));}
}

function saveNote(id){var el=document.getElementById('noteInput-'+id);if(!el)return;var note=el.value.trim();places=places.map(function(p){return p.id===id?Object.assign({},p,{notes:note}):p;});save();closeSheet();openSheet(id);}
function editNote(id){var p=places.find(function(x){return x.id===id;});if(!p)return;var section=document.querySelector('.notes-section');if(!section)return;section.innerHTML='<div class="notes-label">📝 Edit note</div><textarea class="notes-textarea" id="noteInput-'+id+'" style="min-height:100px">'+(p.notes||'')+'</textarea><button class="notes-save-btn" onclick="saveNote(\''+id+'\')">Save Note</button>';document.getElementById('noteInput-'+id).focus();}
function closeSheet(){
  var el=document.getElementById("sheetOverlay");
  if(!el)return;
  el.classList.add("closing");
  setTimeout(function(){if(el.parentNode)el.remove();},300);
}
function closeSheetOutside(e){if(e.target.id==="sheetOverlay")closeSheet();}
function toggleVisSheet(id){toggleVis(id,null);closeSheet();openSheet(id);}
function delFromSheet(id){closeSheet();confirmDelete(id);}

// ── MULTI PLACE PICKER ─────────────────────────────────────────────────────
var pickerSelected={};var pickerPlaces=[];

function openPicker(incomingPlaces){
  var ex=document.getElementById("pickerOverlay");if(ex)ex.remove();
  pickerSelected={};pickerPlaces=incomingPlaces;
  pickerPlaces.forEach(function(p,i){pickerSelected[i]=true;});
  var placesHtml=pickerPlaces.map(function(p,i){
    var thumb=p.photoUrl?'<div class="picker-thumb"><img src="'+p.photoUrl+'" onerror="this.parentElement.innerHTML=\'<div class=picker-thumb-emo>'+emo(p.type)+'</div>\'"/></div>':'<div class="picker-thumb"><div class="picker-thumb-emo">'+emo(p.type)+'</div></div>';
    var rating=p.rating?' · ★'+p.rating.toFixed(1):'';
    return'<div class="picker-place selected" id="pp-'+i+'" onclick="togglePickerPlace('+i+')"><div class="picker-place-check">✓</div>'+thumb+'<div class="picker-info"><div class="picker-name">'+p.name+'</div><div class="picker-meta"><span class="picker-type">'+emo(p.type)+' '+(p.type||'place')+'</span><span>'+(p.city||'')+', '+(p.country||'')+rating+'</span></div></div></div>';
  }).join('');
  var single=pickerPlaces.length===1;
  var html='<div class="picker-overlay" id="pickerOverlay"><div class="picker"><div class="picker-handle"></div><div class="picker-header"><div class="picker-title">'+(single?'Save this place?':pickerPlaces.length+' places found!')+'</div><div class="picker-sub">'+(single?'Confirm and optionally add a note.':'Select which places to save.')+'</div></div><div class="picker-places">'+placesHtml+'</div><div class="picker-notes-wrap"><div class="picker-notes-label">📝 Add a note (optional)</div><textarea class="picker-notes-input" id="pickerNotes" placeholder="Why you want to visit, who recommended it…"></textarea></div><div class="picker-footer"><button class="picker-save-btn" id="pickerSaveBtn" onclick="savePicked()">Save Selected</button><button class="picker-cancel-btn" onclick="closePicker()">Cancel</button></div></div></div>';
  document.body.insertAdjacentHTML('beforeend',html);
  pushBackState("picker");
  enableSwipeDismiss("pickerOverlay",closePicker);
}

function togglePickerPlace(i){pickerSelected[i]=!pickerSelected[i];var el=document.getElementById('pp-'+i);var check=el.querySelector('.picker-place-check');if(pickerSelected[i]){el.classList.add('selected');check.textContent='✓';}else{el.classList.remove('selected');check.textContent='';}var any=Object.values(pickerSelected).some(function(v){return v;});document.getElementById('pickerSaveBtn').disabled=!any;}
function closePicker(){
  var el=document.getElementById('pickerOverlay');
  if(!el)return;
  el.classList.add("closing");
  setTimeout(function(){if(el.parentNode)el.remove();},300);
}
function savePicked(){
  var noteEl=document.getElementById('pickerNotes');var note=noteEl?noteEl.value.trim():'';
  var toSave=[];
  pickerPlaces.forEach(function(p,i){if(!pickerSelected[i])return;toSave.push(Object.assign({id:Date.now().toString()+i+Math.random().toString(36).slice(2,6),visited:false,addedAt:new Date().toISOString(),notes:note},p));});
  if(toSave.length===0)return;
  toSave.forEach(function(p){places.unshift(p);});
  closePicker();save();renderList();if(mapInited)renderMapMarkers();
  showToast('add','ts',toSave.length+' place'+(toSave.length>1?'s':'')+' saved!',toSave.map(function(p){return p.name;}).join(', '));
  if(toSave.length===1)setTimeout(function(){openSheet(toSave[0].id);},400);
}

// ── TOASTS ─────────────────────────────────────────────────────────────────
var tTimers={};
function showToast(id,type,title,sub){clearTimeout(tTimers[id]);var area=document.getElementById("toastArea");var ex=document.getElementById("t-"+id);if(ex)ex.remove();var icon=type==="tl"?'<div class="t-spin"></div>':type==="ts"?'<span class="t-ico">✅</span>':'<span class="t-ico">❌</span>';var prog=type==="tl"?'<div class="t-prog"><div class="t-bar"></div></div>':"";area.insertAdjacentHTML("beforeend",'<div class="toast '+type+'" id="t-'+id+'">'+icon+'<div><div class="t-title">'+title+'</div>'+(sub?'<div class="t-sub">'+sub+'</div>':'')+prog+'</div></div>');if(type!=="tl")tTimers[id]=setTimeout(function(){var el=document.getElementById("t-"+id);if(el)el.remove();},4000);}
function hideToast(id){clearTimeout(tTimers[id]);var el=document.getElementById("t-"+id);if(el)el.remove();}

// ── ADD ─────────────────────────────────────────────────────────────────────
async function doAdd(){
  var input=document.getElementById("addInput");var btn=document.getElementById("addBtn");
  var trimmed=input.value.trim();if(!trimmed)return;
  input.value="";input.disabled=true;btn.disabled=true;
  btn.innerHTML='<div style="width:16px;height:16px;border:2.5px solid rgba(255,255,255,0.4);border-top-color:white;border-radius:50%;animation:spin 0.75s linear infinite"></div>';
  var isLink=/^https?:\/\//i.test(trimmed);
  showToast("add","tl",isLink?"Scraping post…":"Finding places…","AI is identifying locations");
  try{
    var res=await fetch(BACKEND+"/extract",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({input:trimmed})});
    var data=await res.json();
    if(!res.ok||!data.places||data.places.length===0)throw new Error(data.error||"No places found");
    hideToast("add");openPicker(data.places);
  }catch(e){
    hideToast("add");showToast("add","te","Couldn't find a place",e.message&&e.message.length<80?e.message:"Try typing the place name directly");
  }finally{input.disabled=false;btn.disabled=false;btn.innerHTML="+";input.focus();}
}
document.getElementById("addInput").addEventListener("keydown",function(e){if(e.key==="Enter")doAdd();});
document.getElementById("addBtn").addEventListener("click",doAdd);

// ── PWA ─────────────────────────────────────────────────────────────────────
if('serviceWorker' in navigator){navigator.serviceWorker.register('/sw.js').catch(function(){});}

// ── SPLASH DISMISS ─────────────────────────────────────────────────────────
function hideSplash(){
  var s=document.getElementById("splashScreen");
  if(s){s.style.opacity="0";s.style.visibility="hidden";setTimeout(function(){if(s.parentNode)s.parentNode.removeChild(s);},600);}
}
// Hide splash after min 1.4s so branding registers, then once app is ready
var _splashTimer=setTimeout(hideSplash,1800);
function hideSplashEarly(){clearTimeout(_splashTimer);setTimeout(hideSplash,400);}

// ── INIT ───────────────────────────────────────────────────────────────────
try{load();renderList();renderCollections();initAuth().then(hideSplashEarly).catch(hideSplashEarly);}catch(e){console.error("Init error:",e);hideSplash();}
</script>
