<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Hoplist</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet"/>
<link rel="manifest" href="/manifest.json?v=2"/>
<meta name="theme-color" content="#3B5BDB"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="Hoplist"/>
<link rel="apple-touch-icon" href="icon.png"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
/* Remove ALL browser tap highlights globally */
*{-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none;}
input,textarea,button{-webkit-tap-highlight-color:transparent;outline:none;}

:root{
  --blue:#3B5BDB;--blue-light:#EEF2FF;--blue-mid:#BAC8FF;--blue-dark:#2F4AC7;
  --white:#fff;--gray-50:#F8FAFC;--gray-100:#F1F5F9;--gray-200:#E2E8F0;
  --gray-300:#CBD5E1;--gray-400:#94A3B8;--gray-500:#64748B;--gray-600:#475569;
  --gray-700:#334155;--gray-800:#1E293B;--gray-900:#0F172A;
  --green:#10B981;--red:#EF4444;--amber:#F59E0B;
  --shadow:0 4px 16px rgba(0,0,0,0.1);--shadow-lg:0 24px 48px rgba(0,0,0,0.18);
  --r:14px;--r-sm:10px;--nav-h:64px;
}
html,body{height:100%;font-family:'Inter',sans-serif;background:var(--gray-50);color:var(--gray-900);-webkit-font-smoothing:antialiased;}
body{display:flex;flex-direction:column;overflow:hidden;position:fixed;width:100%;}

/* NAV */
.bottom-nav{display:flex;background:var(--white);border-top:1.5px solid var(--gray-200);flex-shrink:0;z-index:9999;width:100%;padding-bottom:env(safe-area-inset-bottom,0px);box-shadow:0 -2px 12px rgba(0,0,0,0.06);}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:10px 0;border:none;background:transparent;cursor:pointer;color:var(--gray-400);font-family:'Inter',sans-serif;transition:color 0.2s,transform 0.15s;}
.nav-btn:active{transform:scale(0.9);}
.nav-btn.active{color:var(--blue);}
.nav-icon{font-size:22px;line-height:1;transition:transform 0.2s cubic-bezier(0.34,1.56,0.64,1);}
.nav-btn.active .nav-icon{transform:scale(1.1);}
.nav-label{font-size:10.5px;font-weight:600;letter-spacing:0.02em;}

/* PAGES */
.page{display:none;flex-direction:column;flex:1;overflow:hidden;min-height:0;}
.page.active{display:flex;}

/* ── HOME ── */
.home-header{background:var(--white);border-bottom:1px solid var(--gray-200);flex-shrink:0;}
.home-top{display:flex;align-items:center;justify-content:space-between;padding:16px 16px 10px;}
.logo{display:flex;align-items:center;gap:10px;}
.logo-icon{width:26px;height:32px;background:linear-gradient(180deg,#82C8FA 0%,#2640D2 100%);border-radius:50% 50% 50% 50% / 40% 40% 60% 60%;display:flex;align-items:center;justify-content:center;color:white;font-size:13px;position:relative;flex-shrink:0;}
.logo-icon::after{content:'';position:absolute;bottom:-5px;left:50%;transform:translateX(-50%);width:0;height:0;border-left:6px solid transparent;border-right:6px solid transparent;border-top:7px solid #2640D2;}
.logo-text{font-family:'Poppins',sans-serif;font-size:20px;font-weight:700;color:var(--gray-900);letter-spacing:-0.3px;}
.hstats{display:flex;gap:14px;}
.hstat-num{font-size:15px;font-weight:700;color:var(--blue);text-align:center;}
.hstat-lbl{font-size:9px;color:var(--gray-400);text-transform:uppercase;letter-spacing:0.06em;font-weight:500;}
.add-row{padding:10px 16px;display:flex;gap:8px;}
.add-input{flex:1;padding:12px 14px;background:var(--gray-50);border:1.5px solid var(--gray-200);border-radius:var(--r-sm);font-family:'Inter',sans-serif;font-size:14px;color:var(--gray-900);outline:none;transition:border-color 0.2s,box-shadow 0.2s;}
.add-input:focus{border-color:var(--blue);background:var(--white);box-shadow:0 0 0 3px rgba(37,99,235,0.1);}
.add-input:disabled{opacity:0.6;}
.add-btn{width:46px;height:46px;background:var(--blue);border:none;border-radius:var(--r-sm);cursor:pointer;color:white;font-size:22px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 2px 8px rgba(37,99,235,0.3);transition:background 0.15s,transform 0.15s cubic-bezier(0.34,1.56,0.64,1);}
.add-btn:active{transform:scale(0.9);}
.add-btn:hover{background:var(--blue-dark);}
.add-btn:disabled{opacity:0.4;cursor:not-allowed;}
.tabs-row{display:flex;padding:0 16px 10px;gap:4px;}
.htab{padding:7px 16px;border-radius:20px;font-size:12.5px;font-weight:600;color:var(--gray-500);cursor:pointer;border:none;background:transparent;font-family:'Inter',sans-serif;transition:all 0.15s;}
.htab.active{background:var(--blue);color:white;}
.htab:not(.active):hover{background:var(--gray-100);}
.search-row{padding:0 16px 12px;position:relative;}
.search-row input{width:100%;padding:9px 14px 9px 36px;background:var(--gray-50);border:1.5px solid var(--gray-200);border-radius:var(--r-sm);font-family:'Inter',sans-serif;font-size:13.5px;outline:none;transition:border-color 0.2s;color:var(--gray-900);}
.search-row input:focus{border-color:var(--blue);}
.search-row input::placeholder{color:var(--gray-400);}
.search-icon{position:absolute;left:28px;top:50%;transform:translateY(-50%);font-size:14px;color:var(--gray-400);pointer-events:none;}

/* LIST */
.place-list{flex:1;overflow-y:auto;padding:8px 0 12px;}
.place-list::-webkit-scrollbar{display:none;}
.country-group{margin-bottom:4px;}
.country-hdr{display:flex;align-items:center;justify-content:space-between;padding:8px 16px 4px;cursor:pointer;user-select:none;}
.country-hdr:hover{background:var(--gray-50);}
.c-left{display:flex;align-items:center;gap:8px;}
.c-flag{font-size:20px;}
.c-name{font-size:14px;font-weight:700;color:var(--gray-800);}
.c-count{font-size:10.5px;color:var(--gray-400);background:var(--gray-100);padding:2px 8px;border-radius:20px;font-weight:500;}
.c-chev{font-size:11px;color:var(--gray-400);transition:transform 0.2s;display:inline-block;}
.c-chev.open{transform:rotate(180deg);}
.city-sec{padding:0 12px 4px;}
.city-lbl{font-size:10px;text-transform:uppercase;letter-spacing:0.1em;color:var(--gray-400);font-weight:600;padding:6px 4px 3px;display:flex;align-items:center;gap:6px;}
.city-lbl::after{content:'';flex:1;height:1px;background:var(--gray-200);}
.pcard{background:var(--white);border-radius:var(--r-sm);margin:3px 4px;border:1.5px solid var(--gray-100);overflow:hidden;}
.pcard-main{display:flex;align-items:center;gap:12px;padding:10px 12px;cursor:pointer;transition:background 0.15s,transform 0.1s;user-select:none;}
.pcard-main:active{transform:scale(0.99);background:var(--blue-light);}
.pcard-main:hover{background:var(--gray-50);}
.pthumb{width:52px;height:52px;border-radius:9px;overflow:hidden;flex-shrink:0;background:var(--gray-100);}
.pthumb img{width:100%;height:100%;object-fit:cover;display:block;}
.pthumb-emo{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:24px;background:linear-gradient(135deg,var(--blue-light),var(--blue-mid));}
.pinfo{flex:1;min-width:0;}
.pname{font-size:14px;font-weight:600;color:var(--gray-900);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px;}
.pmeta{display:flex;align-items:center;gap:5px;overflow:hidden;}
.ptype-tag{font-size:11px;color:var(--blue);background:var(--blue-light);padding:2px 8px;border-radius:20px;font-weight:600;text-transform:capitalize;white-space:nowrap;}
.prating{font-size:11.5px;color:var(--amber);font-weight:700;white-space:nowrap;}
.pvis-tag{font-size:10px;color:var(--green);background:#D1FAE5;padding:2px 7px;border-radius:20px;font-weight:600;white-space:nowrap;}
.pchev{font-size:12px;color:var(--gray-400);flex-shrink:0;}
.pcard-actions{display:flex;border-top:1px solid var(--gray-100);}
.pact{flex:1;padding:10px;border:none;background:transparent;font-family:'Inter',sans-serif;font-size:12.5px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;transition:background 0.15s;}
.pact:not(:last-child){border-right:1px solid var(--gray-100);}
.pact.vis{color:var(--green);}
.pact.vis:hover{background:#D1FAE5;}
.pact.vis.on{background:#D1FAE5;color:#065F46;}
.pact.map{color:var(--blue);}
.pact.map:hover{background:var(--blue-light);}
.pact.col{color:#7C3AED;}
.pact.col:hover{background:#EDE9FE;}
.pact.del{color:var(--red);}
.pact.del:hover{background:#FEE2E2;}
.pcard-confirm{display:none;padding:12px 16px;background:#FEF2F2;border-top:1px solid #FECACA;align-items:center;justify-content:space-between;gap:10px;}
.pcard-confirm.show{display:flex;}
.confirm-text{font-size:13px;color:var(--red);font-weight:500;}
.confirm-btns{display:flex;gap:8px;}
.cbtn{padding:7px 14px;border-radius:8px;border:none;font-family:'Inter',sans-serif;font-size:12.5px;font-weight:600;cursor:pointer;transition:all 0.15s;}
.cbtn.yes{background:var(--red);color:white;}
.cbtn.no{background:var(--gray-200);color:var(--gray-700);}

/* EMPTY */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:12px;padding:32px;text-align:center;}
.empty-icon{font-size:52px;opacity:0.18;}
.empty-title{font-size:17px;font-weight:700;color:var(--gray-500);}
.empty-sub{font-size:13px;color:var(--gray-400);line-height:1.65;max-width:220px;}
.empty-examples{display:flex;flex-direction:column;gap:6px;width:100%;margin-top:4px;}
.ex-btn{font-size:13px;color:var(--gray-700);background:var(--white);border:1.5px solid var(--gray-200);border-radius:var(--r-sm);padding:11px 14px;cursor:pointer;text-align:left;font-family:'Inter',sans-serif;transition:all 0.15s;}
.ex-btn:hover{border-color:var(--blue);color:var(--blue);background:var(--blue-light);}
.skel-wrap{padding:4px 16px;}
.skel-card{background:var(--white);border-radius:var(--r-sm);padding:12px;display:flex;gap:12px;align-items:center;margin:3px 0;}
.skel-img{width:52px;height:52px;border-radius:9px;background:var(--gray-100);flex-shrink:0;}
.skel-lines{flex:1;display:flex;flex-direction:column;gap:8px;}
.skel-line{height:11px;border-radius:4px;background:linear-gradient(90deg,var(--gray-100) 25%,var(--gray-50) 50%,var(--gray-100) 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;}
@keyframes shimmer{0%{background-position:-200% 0;}100%{background-position:200% 0;}}

/* ── COLLECTIONS PAGE ── */
.col-page{background:var(--gray-50);}
.col-header{background:var(--white);border-bottom:1px solid var(--gray-200);padding:16px 16px 14px;flex-shrink:0;display:flex;align-items:center;justify-content:space-between;}
.col-title{font-family:'Poppins',sans-serif;font-size:22px;color:var(--gray-900);}
.col-new-btn{width:38px;height:38px;background:var(--blue);border:none;border-radius:10px;cursor:pointer;color:white;font-size:22px;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(37,99,235,0.3);transition:background 0.15s;}
.col-new-btn:hover{background:var(--blue-dark);}
.col-list{flex:1;overflow-y:auto;padding:16px 16px 20px;display:flex;flex-direction:column;gap:14px;}
.col-list::-webkit-scrollbar{display:none;}

/* COLLECTION CARD */
.col-card{border-radius:18px;overflow:hidden;cursor:pointer;box-shadow:var(--shadow);transition:transform 0.2s cubic-bezier(0.34,1.56,0.64,1),box-shadow 0.2s ease;position:relative;min-height:200px;display:flex;flex-direction:column;justify-content:flex-end;user-select:none;}
.col-card:active{transform:scale(0.97);box-shadow:0 2px 8px rgba(0,0,0,0.12);}
.col-card-bg{position:absolute;inset:0;background-size:cover;background-position:center;}
.col-card-gradient{position:absolute;inset:0;background:linear-gradient(to bottom, rgba(0,0,0,0.05) 0%, rgba(0,0,0,0.7) 100%);}
.col-card-body{position:relative;padding:20px;}
.col-card-emoji{font-size:28px;margin-bottom:6px;display:block;}
.col-card-name{font-family:'Poppins',sans-serif;font-size:22px;color:white;font-weight:600;margin-bottom:6px;line-height:1.2;}
.col-card-meta{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.col-card-stat{font-size:12px;color:rgba(255,255,255,0.85);font-weight:500;display:flex;align-items:center;gap:4px;}
.col-card-countries{display:flex;gap:2px;}
.col-card-actions{position:absolute;top:14px;right:14px;display:flex;gap:6px;}
.col-card-btn{width:32px;height:32px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;transition:all 0.15s;backdrop-filter:blur(8px);}
.col-card-btn.edit{background:rgba(255,255,255,0.2);color:white;}
.col-card-btn.edit:hover{background:rgba(255,255,255,0.35);}
.col-card-btn.share{background:rgba(255,255,255,0.2);color:white;}
.col-card-btn.share:hover{background:rgba(255,255,255,0.35);}
.col-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:14px;padding:40px;text-align:center;}
.col-empty-icon{font-size:56px;opacity:0.18;}
.col-empty-title{font-size:18px;font-weight:700;color:var(--gray-500);}
.col-empty-sub{font-size:13px;color:var(--gray-400);line-height:1.65;max-width:230px;}
.col-create-btn{padding:13px 28px;background:var(--blue);color:white;border:none;border-radius:var(--r-sm);font-family:'Inter',sans-serif;font-size:14px;font-weight:600;cursor:pointer;box-shadow:0 2px 8px rgba(37,99,235,0.3);}

/* COLLECTION DETAIL PAGE */
/* TRIP DATE & SECTIONS */
.col-date-pill{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,0.18);backdrop-filter:blur(8px);border:1.5px solid rgba(255,255,255,0.3);border-radius:20px;padding:6px 14px;color:white;font-size:12.5px;font-weight:600;cursor:pointer;margin-top:8px;transition:background 0.15s;}
.col-date-pill:active{background:rgba(255,255,255,0.3);}
.col-date-pill.no-date{border-style:dashed;opacity:0.75;}
.col-date-countdown{font-size:11px;opacity:0.8;font-weight:500;}
/* SECTION TABS - horizontal */
.sec-tabs-wrap{flex-shrink:0;border-bottom:1.5px solid var(--gray-100);}
.sec-tabs{display:flex;overflow-x:auto;gap:0;padding:0 12px;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.sec-tabs::-webkit-scrollbar{display:none;}
.sec-tab{padding:12px 14px 10px;font-family:'Inter',sans-serif;font-size:13px;font-weight:600;color:var(--gray-400);cursor:pointer;border:none;background:transparent;white-space:nowrap;transition:all 0.2s;flex-shrink:0;border-bottom:2.5px solid transparent;position:relative;display:flex;align-items:center;gap:5px;}
.sec-tab.active{color:var(--gray-900);border-bottom-color:var(--gray-900);}
.sec-tab-count{font-size:11px;color:var(--gray-400);background:var(--gray-100);padding:1px 6px;border-radius:10px;font-weight:500;}
.sec-tab.active .sec-tab-count{background:var(--gray-200);color:var(--gray-700);}
.sec-tab-edit{width:20px;height:20px;border-radius:50%;border:none;background:transparent;color:var(--gray-400);font-size:11px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;}
.sec-tab-edit:active{background:var(--gray-100);}
.sec-add-tab{padding:12px 10px 10px;font-family:'Inter',sans-serif;font-size:20px;color:var(--gray-400);cursor:pointer;border:none;background:transparent;flex-shrink:0;border-bottom:2.5px solid transparent;line-height:1;}
.sec-content{flex:1;overflow-y:auto;padding:8px 0 20px;}
.sec-content::-webkit-scrollbar{display:none;}
.sec-add-place-btn{display:flex;align-items:center;gap:8px;padding:12px 16px;color:var(--blue);font-size:13px;font-weight:600;cursor:pointer;border:none;background:transparent;font-family:'Inter',sans-serif;width:100%;}
.unsorted-label{font-size:10px;text-transform:uppercase;letter-spacing:0.1em;color:var(--gray-400);font-weight:600;padding:10px 16px 4px;display:flex;align-items:center;gap:8px;}
.unsorted-label::after{content:'';flex:1;height:1px;background:var(--gray-200);}
.sec-place-badge{font-size:10.5px;color:var(--gray-400);background:var(--gray-100);padding:2px 8px;border-radius:20px;font-weight:500;cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all 0.15s;border:1px solid transparent;}
.sec-place-badge:hover{border-color:var(--blue);color:var(--blue);background:var(--blue-light);}
/* Date input modal */
.date-row{display:flex;gap:10px;margin-bottom:14px;}
.date-field{flex:1;}
.date-field label{display:block;font-size:11px;font-weight:600;color:var(--gray-500);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:5px;}
.date-field input[type=date]{width:100%;padding:11px 12px;background:var(--gray-50);border:1.5px solid var(--gray-200);border-radius:var(--r-sm);font-family:'Inter',sans-serif;font-size:14px;color:var(--gray-900);outline:none;transition:border-color 0.2s;}
.date-field input[type=date]:focus{border-color:var(--blue);}
/* Section rename modal */
.sec-modal{background:var(--white);border-radius:24px 24px 0 0;width:100%;max-width:520px;padding:20px 20px calc(20px + env(safe-area-inset-bottom,0px));animation:slideUp 0.3s cubic-bezier(0.16,1,0.3,1);}

.col-detail-page{position:fixed;inset:0;background:var(--white);z-index:800;display:none;flex-direction:column;transform:translateX(100%);transition:transform 0.35s cubic-bezier(0.16,1,0.3,1);}
.col-detail-page.open{display:flex;transform:translateX(0);}
.col-detail-page.closing{transform:translateX(100%);}
.col-detail-hero{position:relative;height:240px;flex-shrink:0;}
.col-detail-hero-bg{position:absolute;inset:0;background-size:cover;background-position:center;overflow:hidden;border-radius:inherit;}
.col-detail-hero-grad{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,0.2) 0%,rgba(0,0,0,0.75) 100%);pointer-events:none;}
.col-detail-hero-content{position:relative;z-index:1;padding:20px 20px 16px;display:flex;flex-direction:column;justify-content:flex-end;height:100%;overflow:visible;}
.col-detail-back{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,0.2);backdrop-filter:blur(8px);border:none;cursor:pointer;color:white;font-size:18px;display:flex;align-items:center;justify-content:center;margin-bottom:auto;}
.col-detail-emoji{font-size:32px;margin-bottom:6px;}
.col-detail-name{font-family:'Poppins',sans-serif;font-size:26px;color:white;font-weight:600;margin-bottom:6px;}
.col-detail-meta{display:flex;align-items:center;gap:8px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding-bottom:4px;margin:0 -20px;padding-left:20px;padding-right:20px;}.col-detail-meta::-webkit-scrollbar{display:none;}
.col-detail-stat{font-size:12.5px;color:rgba(255,255,255,0.85);font-weight:500;flex-shrink:0;white-space:nowrap;}
.col-detail-share{padding:8px 14px;background:rgba(255,255,255,0.2);backdrop-filter:blur(8px);border:1.5px solid rgba(255,255,255,0.3);border-radius:20px;color:white;font-family:'Inter',sans-serif;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px;transition:all 0.15s;flex-shrink:0;white-space:nowrap;}
.col-detail-share:hover{background:rgba(255,255,255,0.35);}
.col-detail-places{flex:1;overflow-y:auto;padding:12px 0 20px;}
.col-detail-places::-webkit-scrollbar{display:none;}

/* MAP PAGE */
.map-page{position:relative;}
#map{width:100%;height:100%;}
.map-search-bar{position:absolute;top:16px;left:16px;right:16px;z-index:500;}
.map-search-inner{background:white;border-radius:var(--r);box-shadow:0 2px 16px rgba(0,0,0,0.15);display:flex;align-items:center;overflow:hidden;}
.ms-icon{padding:0 12px;font-size:18px;color:var(--gray-400);flex-shrink:0;}
.ms-input{flex:1;padding:14px 0;font-family:'Inter',sans-serif;font-size:15px;color:var(--gray-900);border:none;outline:none;background:transparent;}
.ms-input::placeholder{color:var(--gray-400);}
.ms-clear{padding:0 14px;font-size:15px;color:var(--gray-400);cursor:pointer;border:none;background:transparent;display:none;}
.ms-clear.show{display:block;}
.map-chips{position:absolute;top:74px;left:0;right:0;z-index:500;padding:0 16px;display:flex;gap:8px;overflow-x:auto;-webkit-overflow-scrolling:touch;}
.map-chips::-webkit-scrollbar{display:none;}
.mchip{background:white;border:none;border-radius:20px;padding:7px 13px;font-family:'Inter',sans-serif;font-size:12px;font-weight:600;color:var(--gray-600);box-shadow:0 1px 6px rgba(0,0,0,0.12);cursor:pointer;white-space:nowrap;transition:all 0.15s;flex-shrink:0;display:flex;align-items:center;}
.mchip.active{background:var(--gray-900);color:white;box-shadow:0 2px 8px rgba(0,0,0,0.2);}
.map-bottom-stats{position:absolute;bottom:16px;left:16px;z-index:500;display:flex;gap:8px;}
.mstat{background:white;border-radius:20px;padding:7px 13px;font-size:12px;font-weight:600;color:var(--gray-700);box-shadow:0 1px 6px rgba(0,0,0,0.12);display:flex;align-items:center;gap:5px;}
.mstat-dot{width:8px;height:8px;border-radius:50%;}

/* DETAIL SHEET */
.sheet-overlay{position:fixed;inset:0;background:rgba(15,23,42,0.4);z-index:2000;display:flex;align-items:flex-end;justify-content:center;animation:fadeIn 0.25s ease;backdrop-filter:blur(4px);}
.sheet{background:var(--white);border-radius:24px 24px 0 0;width:100%;max-width:520px;max-height:85vh;overflow-y:auto;animation:slideUp 0.4s cubic-bezier(0.16,1,0.3,1);padding-bottom:calc(var(--nav-h) + env(safe-area-inset-bottom,0px) + 16px);}
.sheet::-webkit-scrollbar{display:none;}
@keyframes slideUp{from{transform:translateY(100%);}to{transform:translateY(0);}}
@keyframes slideDown{from{transform:translateY(0);}to{transform:translateY(100%);}}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
@keyframes fadeOut{from{opacity:1;}to{opacity:0;}}
@keyframes toastIn{from{opacity:0;transform:translateY(10px) scale(0.95);}to{opacity:1;transform:translateY(0) scale(1);}}
.sheet-overlay.closing{animation:fadeOut 0.3s ease forwards;}
.sheet-overlay.closing .sheet{animation:slideDown 0.3s cubic-bezier(0.4,0,1,1) forwards;}
.sheet-handle{width:36px;height:4px;background:var(--gray-300);border-radius:4px;margin:12px auto 0;}
.sheet-photo{width:100%;height:200px;object-fit:cover;display:block;}
.sheet-photo-emo{width:100%;height:180px;background:linear-gradient(135deg,var(--blue-light),var(--blue-mid));display:flex;align-items:center;justify-content:center;font-size:72px;}
.sheet-body{padding:18px 20px 24px;}
.sheet-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:8px;}
.sheet-name{font-family:'Poppins',sans-serif;font-size:22px;line-height:1.25;flex:1;}
.sheet-x{width:32px;height:32px;border-radius:50%;border:none;background:var(--gray-100);color:var(--gray-600);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.sheet-x:hover{background:var(--gray-200);}
.sheet-pills{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;}
.spill{font-size:12px;padding:4px 10px;border-radius:20px;font-weight:600;}
.spill.type{color:var(--blue);background:var(--blue-light);cursor:pointer;}
.spill.rat{color:var(--amber);background:#FEF3C7;}
.spill.open{color:var(--green);background:#D1FAE5;}
.spill.closed{color:var(--red);background:#FEE2E2;}
.spill.price{color:var(--gray-600);background:var(--gray-100);}
.sheet-addr{display:flex;align-items:flex-start;gap:7px;font-size:13px;color:var(--gray-500);margin-bottom:12px;line-height:1.5;}
.sheet-desc{font-size:14px;color:var(--gray-600);line-height:1.75;margin-bottom:18px;}
.sheet-hr{height:1px;background:var(--gray-100);margin-bottom:16px;}
.sheet-acts{display:flex;flex-direction:column;gap:8px;}
.sact{display:flex;align-items:center;justify-content:center;gap:8px;padding:13px;border-radius:var(--r-sm);font-family:'Inter',sans-serif;font-size:14px;font-weight:600;cursor:pointer;border:none;text-decoration:none;transition:all 0.15s,transform 0.1s;user-select:none;}
.sact:active{transform:scale(0.97);}
.sact.primary{background:var(--blue);color:white;}
.sact.primary:hover{background:var(--blue-dark);}
.sact-row{display:flex;gap:8px;}
.sact.half{flex:1;}
.sact.sec{background:var(--gray-100);color:var(--gray-700);}
.sact.sec:hover{background:var(--gray-200);}
.sact.suc{background:#D1FAE5;color:#065F46;}
.sact.suc:hover{background:#A7F3D0;}
.sact.dan{background:#FEE2E2;color:#991B1B;}
.sact.dan:hover{background:#FECACA;}
.sact.purple{background:#EDE9FE;color:#5B21B6;}
.sact.purple:hover{background:#DDD6FE;}
.sheet-confirm{background:#FEF2F2;border:1.5px solid #FECACA;border-radius:var(--r-sm);padding:14px;display:none;flex-direction:column;gap:10px;}
.sheet-confirm.show{display:flex;}
.sc-text{font-size:13.5px;color:var(--red);font-weight:500;text-align:center;}
.sc-btns{display:flex;gap:8px;}
.sc-btn{flex:1;padding:10px;border-radius:8px;border:none;font-family:'Inter',sans-serif;font-size:13px;font-weight:600;cursor:pointer;}
.sc-btn.yes{background:var(--red);color:white;}
.sc-btn.no{background:var(--gray-200);color:var(--gray-700);}

/* CATEGORY EDITOR */
.cat-editor{margin-bottom:14px;}
.cat-editor-label{font-size:11.5px;font-weight:600;color:var(--gray-500);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:8px;display:flex;align-items:center;gap:5px;}
.cat-grid{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px;}
.cat-opt{padding:6px 12px;border-radius:20px;border:1.5px solid var(--gray-200);background:var(--white);font-family:'Inter',sans-serif;font-size:12px;font-weight:600;color:var(--gray-600);cursor:pointer;transition:all 0.15s;}
.cat-opt:hover{border-color:var(--blue);color:var(--blue);}
.cat-opt.selected{color:white;border-color:transparent;}
.cat-custom-row{display:flex;gap:6px;margin-top:4px;}
.cat-custom-input{flex:1;padding:8px 12px;background:var(--gray-50);border:1.5px solid var(--gray-200);border-radius:20px;font-family:'Inter',sans-serif;font-size:13px;color:var(--gray-900);outline:none;transition:border-color 0.2s;}
.cat-custom-input:focus{border-color:var(--blue);}
.cat-custom-input::placeholder{color:var(--gray-400);}
.cat-save-btn{padding:8px 14px;background:var(--blue);color:white;border:none;border-radius:20px;font-family:'Inter',sans-serif;font-size:12.5px;font-weight:600;cursor:pointer;}

/* NOTES */
.notes-section{margin-bottom:14px;}
.notes-label{font-size:11.5px;font-weight:600;color:var(--gray-500);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:6px;display:flex;align-items:center;gap:5px;}
.notes-textarea{width:100%;padding:11px 13px;background:var(--gray-50);border:1.5px solid var(--gray-200);border-radius:var(--r-sm);font-family:'Inter',sans-serif;font-size:14px;color:var(--gray-900);outline:none;resize:none;min-height:80px;line-height:1.6;transition:border-color 0.2s,box-shadow 0.2s;}
.notes-textarea:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,0.1);background:var(--white);}
.notes-textarea::placeholder{color:var(--gray-400);}
.notes-display{background:rgba(245,158,11,0.08);border:1.5px solid rgba(245,158,11,0.2);border-radius:var(--r-sm);padding:11px 13px;font-size:13.5px;color:var(--gray-700);line-height:1.6;white-space:pre-wrap;cursor:pointer;}
.notes-display:hover{border-color:rgba(245,158,11,0.4);}
.notes-display-label{font-size:10.5px;font-weight:600;color:var(--amber);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:5px;display:flex;align-items:center;gap:4px;}
.notes-save-btn{margin-top:7px;padding:9px 16px;background:var(--blue);color:white;border:none;border-radius:var(--r-sm);font-family:'Inter',sans-serif;font-size:13px;font-weight:600;cursor:pointer;width:100%;}

/* MODALS */
.modal-overlay{position:fixed;inset:0;background:rgba(15,23,42,0.5);z-index:3000;display:flex;align-items:flex-end;justify-content:center;animation:fadeIn 0.2s ease;backdrop-filter:blur(4px);}
.modal-overlay.closing{animation:fadeOut 0.3s ease forwards;}
.modal-overlay.closing .modal,.modal-overlay.closing .bsheet{animation:slideDown 0.3s cubic-bezier(0.4,0,1,1) forwards;}
.bsheet{background:var(--white);border-radius:24px 24px 0 0;width:100%;max-width:520px;overflow-y:auto;max-height:93vh;-webkit-overflow-scrolling:touch;animation:slideUp 0.3s cubic-bezier(0.16,1,0.3,1);}
.bsheet::-webkit-scrollbar{display:none;}
.bsheet-handle{padding:14px 0 6px;display:flex;justify-content:center;cursor:grab;touch-action:none;}
.bsheet-handle-bar{width:40px;height:5px;background:var(--gray-300);border-radius:4px;}
.bsheet-pad{padding:0 20px 100px;}
.bsheet-title{font-family:'Poppins',sans-serif;font-size:20px;color:var(--gray-900);margin-bottom:16px;}
.modal-input{width:100%;padding:12px 14px;background:var(--gray-50);border:1.5px solid var(--gray-200);border-radius:var(--r-sm);font-family:'Inter',sans-serif;font-size:14px;color:var(--gray-900);outline:none;margin-bottom:12px;transition:border-color 0.2s;}
.modal-input:focus{border-color:var(--blue);}
.modal-input::placeholder{color:var(--gray-400);}
.modal-label{font-size:12px;font-weight:600;color:var(--gray-500);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:8px;display:block;}
.modal-btns{display:flex;gap:8px;margin-top:16px;}
.mbtn{flex:1;padding:13px;border-radius:var(--r-sm);font-family:'Inter',sans-serif;font-size:14px;font-weight:600;cursor:pointer;border:none;transition:all 0.15s;}
.mbtn.primary{background:var(--blue);color:white;}
.mbtn.primary:hover{background:var(--blue-dark);}
.mbtn.secondary{background:var(--gray-100);color:var(--gray-700);}
.mbtn:active{transform:scale(0.97);}
.emoji-grid{display:flex;overflow-x:auto;gap:8px;margin-bottom:4px;padding-bottom:4px;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.emoji-grid::-webkit-scrollbar{display:none;}
.emoji-opt{width:44px;height:44px;border-radius:12px;border:2px solid var(--gray-200);background:var(--gray-50);font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s;flex-shrink:0;}
.emoji-opt.selected{border-color:var(--blue);background:var(--blue-light);}
.sheet-handle{width:40px;height:5px;background:var(--gray-300);border-radius:4px;margin:14px auto 4px;cursor:grab;touch-action:none;display:block;}
.picker-handle{width:40px;height:5px;background:var(--gray-300);border-radius:4px;margin:14px auto 4px;cursor:grab;touch-action:none;display:block;}
/* Drag handle zones — make them grabbable */
.sheet-handle:active,.picker-handle:active{cursor:grabbing;}
.col-picker-list{display:flex;flex-direction:column;gap:8px;margin-bottom:16px;max-height:300px;overflow-y:auto;}
.col-picker-item{display:flex;align-items:center;gap:12px;padding:12px;border-radius:var(--r-sm);border:1.5px solid var(--gray-200);cursor:pointer;transition:all 0.15s;}
.col-picker-item:hover{border-color:var(--blue);background:var(--blue-light);}
.col-picker-item.in-col{border-color:var(--green);background:#D1FAE5;}
.col-picker-emoji{font-size:22px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;border-radius:9px;flex-shrink:0;}
.col-picker-name{font-size:14px;font-weight:600;color:var(--gray-900);flex:1;}
.col-picker-count{font-size:12px;color:var(--gray-400);}
.col-picker-check{font-size:16px;color:var(--green);}

/* SHARE PAGE */
.share-page{display:none;position:fixed;inset:0;background:var(--white);z-index:9999;flex-direction:column;}
.share-page.open{display:flex;}
.share-hero{position:relative;height:260px;flex-shrink:0;overflow:hidden;}
.share-hero-bg{position:absolute;inset:0;background-size:cover;background-position:center;}
.share-hero-grad{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,0.15) 0%,rgba(0,0,0,0.8) 100%);}
.share-hero-content{position:relative;padding:24px 20px 24px;display:flex;flex-direction:column;justify-content:flex-end;height:100%;}
.share-brand{font-size:12px;font-weight:700;color:rgba(255,255,255,0.7);text-transform:uppercase;letter-spacing:0.12em;margin-bottom:auto;}
.share-emoji{font-size:32px;margin-bottom:6px;}
.share-name{font-family:'Poppins',sans-serif;font-size:28px;color:white;font-weight:600;margin-bottom:6px;}
.share-meta{font-size:13px;color:rgba(255,255,255,0.8);}
.share-map-wrap{height:200px;flex-shrink:0;}
.share-map-wrap #shareMap{width:100%;height:100%;}
.share-places{flex:1;overflow-y:auto;padding:12px 16px 80px;}
.share-places::-webkit-scrollbar{display:none;}
.share-place-card{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--gray-100);}
.share-place-card:last-child{border-bottom:none;}
.share-place-thumb{width:48px;height:48px;border-radius:9px;overflow:hidden;flex-shrink:0;background:var(--gray-100);}
.share-place-thumb img{width:100%;height:100%;object-fit:cover;}
.share-place-thumb-emo{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:22px;background:linear-gradient(135deg,var(--blue-light),var(--blue-mid));}
.share-place-info{flex:1;min-width:0;}
.share-place-name{font-size:14px;font-weight:600;color:var(--gray-900);margin-bottom:2px;}
.share-place-sub{font-size:12px;color:var(--gray-400);}
.share-footer{position:fixed;bottom:0;left:0;right:0;background:var(--white);border-top:1px solid var(--gray-200);padding:16px;display:flex;gap:8px;}
.share-gmaps-btn{flex:1;padding:13px;background:var(--blue);color:white;border:none;border-radius:var(--r-sm);font-family:'Inter',sans-serif;font-size:14px;font-weight:600;cursor:pointer;text-decoration:none;display:flex;align-items:center;justify-content:center;gap:7px;}
.share-roamy-btn{padding:13px 16px;background:var(--gray-100);color:var(--gray-700);border:none;border-radius:var(--r-sm);font-family:'Inter',sans-serif;font-size:14px;font-weight:600;cursor:pointer;white-space:nowrap;}

/* PICKER NOTES */
.picker-notes-wrap{padding:0 16px 12px;}
.picker-notes-label{font-size:11.5px;font-weight:600;color:var(--gray-500);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:6px;}
.picker-notes-input{width:100%;padding:11px 13px;background:var(--gray-50);border:1.5px solid var(--gray-200);border-radius:var(--r-sm);font-family:'Inter',sans-serif;font-size:14px;color:var(--gray-900);outline:none;resize:none;min-height:70px;line-height:1.6;transition:border-color 0.2s;}
.picker-notes-input:focus{border-color:var(--blue);background:var(--white);}
.picker-notes-input::placeholder{color:var(--gray-400);}
.picker-place{background:var(--gray-50);border:1.5px solid var(--gray-200);border-radius:var(--r-sm);display:flex;align-items:center;gap:12px;padding:12px;cursor:pointer;transition:all 0.15s;}
.picker-place:hover{border-color:var(--blue);background:var(--blue-light);}
.picker-place.selected{border-color:var(--blue);background:var(--blue-light);}
.picker-place-check{width:24px;height:24px;border-radius:50%;border:2px solid var(--gray-300);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:13px;transition:all 0.15s;}
.picker-place.selected .picker-place-check{background:var(--blue);border-color:var(--blue);color:white;}
.picker-thumb{width:48px;height:48px;border-radius:9px;overflow:hidden;flex-shrink:0;background:var(--gray-100);}
.picker-thumb img{width:100%;height:100%;object-fit:cover;}
.picker-thumb-emo{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:22px;background:linear-gradient(135deg,var(--blue-light),var(--blue-mid));}
.picker-info{flex:1;min-width:0;}
.picker-name{font-size:14px;font-weight:600;color:var(--gray-900);margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.picker-meta{font-size:12px;color:var(--gray-500);display:flex;align-items:center;gap:5px;}
.picker-type{font-size:11px;color:var(--blue);background:var(--blue-light);padding:1px 7px;border-radius:20px;font-weight:600;}
.picker-overlay{position:fixed;inset:0;background:rgba(15,23,42,0.4);z-index:2000;display:flex;align-items:flex-end;justify-content:center;animation:fadeIn 0.2s ease;backdrop-filter:blur(3px);}
.picker{background:var(--white);border-radius:24px 24px 0 0;width:100%;max-width:520px;max-height:85vh;overflow-y:auto;animation:slideUp 0.32s cubic-bezier(0.16,1,0.3,1);padding-bottom:calc(var(--nav-h) + 16px);}
.picker::-webkit-scrollbar{display:none;}
.picker-handle{width:36px;height:4px;background:var(--gray-300);border-radius:4px;margin:12px auto 0;}
.picker-header{padding:16px 20px 12px;}
.picker-title{font-family:'Poppins',sans-serif;font-size:19px;color:var(--gray-900);margin-bottom:4px;}
.picker-sub{font-size:13px;color:var(--gray-400);}
.picker-places{padding:0 16px 16px;display:flex;flex-direction:column;gap:10px;}
.picker-footer{padding:0 16px 8px;display:flex;gap:8px;flex-direction:column;}
.picker-save-btn{width:100%;padding:14px;background:var(--blue);color:white;border:none;border-radius:var(--r-sm);font-family:'Inter',sans-serif;font-size:15px;font-weight:700;cursor:pointer;}
.picker-save-btn:disabled{opacity:0.4;cursor:not-allowed;}
.picker-cancel-btn{width:100%;padding:12px;background:var(--gray-100);color:var(--gray-600);border:none;border-radius:var(--r-sm);font-family:'Inter',sans-serif;font-size:14px;font-weight:600;cursor:pointer;}

/* AUTH SCREEN */
.auth-screen{position:fixed;inset:0;background:#f9fafd;z-index:99999;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;animation:fadeIn 0.4s ease;}
.auth-logo{display:flex;align-items:center;gap:14px;margin-bottom:8px;}
.auth-logo-icon{width:52px;height:64px;background:linear-gradient(180deg,rgba(255,255,255,0.85) 0%,rgba(255,255,255,0.55) 100%);border-radius:50% 50% 50% 50% / 38% 38% 62% 62%;display:flex;align-items:center;justify-content:center;font-size:22px;position:relative;flex-shrink:0;}
.auth-logo-icon::after{content:'';position:absolute;bottom:-10px;left:50%;transform:translateX(-50%);width:0;height:0;border-left:13px solid transparent;border-right:13px solid transparent;border-top:15px solid rgba(255,255,255,0.55);}
.auth-logo-text{font-family:'Poppins',sans-serif;font-size:38px;color:white;font-weight:800;letter-spacing:-0.5px;}
.auth-tagline{font-size:15px;color:rgba(0,0,0,0.45);margin-bottom:36px;text-align:center;}
.auth-card{background:white;border-radius:24px;padding:28px 24px;width:100%;max-width:380px;box-shadow:0 24px 60px rgba(0,0,0,0.25);}
.auth-tabs{display:flex;background:var(--gray-100);border-radius:12px;padding:3px;margin-bottom:22px;}
.auth-tab{flex:1;padding:9px;border:none;background:transparent;border-radius:10px;font-family:'Inter',sans-serif;font-size:13.5px;font-weight:600;color:var(--gray-500);cursor:pointer;transition:all 0.2s;}
.auth-tab.active{background:white;color:var(--gray-900);box-shadow:0 1px 4px rgba(0,0,0,0.1);}
.auth-field{margin-bottom:14px;}
.auth-field label{display:block;font-size:12px;font-weight:600;color:var(--gray-600);margin-bottom:5px;text-transform:uppercase;letter-spacing:0.05em;}
.auth-field input{width:100%;padding:13px 14px;background:var(--gray-50);border:1.5px solid var(--gray-200);border-radius:var(--r-sm);font-family:'Inter',sans-serif;font-size:15px;color:var(--gray-900);outline:none;transition:border-color 0.2s;}
.auth-field input:focus{border-color:var(--blue);background:white;}
.auth-submit{width:100%;padding:14px;background:var(--blue);color:white;border:none;border-radius:var(--r-sm);font-family:'Inter',sans-serif;font-size:15px;font-weight:700;cursor:pointer;margin-top:4px;transition:background 0.15s;display:flex;align-items:center;justify-content:center;gap:8px;}
.auth-submit:hover{background:var(--blue-dark);}
.auth-submit:disabled{opacity:0.5;cursor:not-allowed;}
.auth-error{background:#FEE2E2;border:1px solid #FECACA;border-radius:8px;padding:10px 14px;font-size:13px;color:#991B1B;margin-bottom:14px;display:none;}
.auth-error.show{display:block;}
.user-btn{width:34px;height:34px;border-radius:50%;background:var(--blue-light);border:2px solid var(--blue-mid);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:var(--blue);cursor:pointer;flex-shrink:0;}
.user-menu{position:fixed;top:60px;right:12px;background:white;border:1px solid var(--gray-200);border-radius:var(--r);box-shadow:var(--shadow-lg);z-index:5000;min-width:200px;overflow:hidden;animation:toastIn 0.2s ease;}
.user-menu-header{padding:14px 16px;border-bottom:1px solid var(--gray-100);}
.user-menu-email{font-size:13px;color:var(--gray-500);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.user-menu-item{padding:13px 16px;font-size:14px;font-weight:500;color:var(--gray-700);cursor:pointer;display:flex;align-items:center;gap:10px;transition:background 0.15s;}
.user-menu-item:hover{background:var(--gray-50);}
.user-menu-item.danger{color:var(--red);}
.sync-dot{width:8px;height:8px;border-radius:50%;background:var(--green);margin-left:auto;flex-shrink:0;}

// ── State ──────────────────────────────────────────────────────────────────
var places=[];var collections=[];

// ── AUTH & SYNC ────────────────────────────────────────────────────────────
// Migrate token key from old "roamy_token" to "hoplist_token"
if(!localStorage.getItem("hoplist_token")&&localStorage.getItem("roamy_token")){localStorage.setItem("hoplist_token",localStorage.getItem("roamy_token"));localStorage.removeItem("roamy_token");}
var authToken = localStorage.getItem("hoplist_token") || null;
var currentUser = null;
var syncTimeout = null;

function authHeaders(){return{"Content-Type":"application/json","Authorization":"Bearer "+authToken};}

async function initAuth(){
  if(window._isShareMode){return;} // share page needs no auth
  if(!authToken){showAuthScreen();return;}
  try{
    var res=await fetch(BACKEND+"/auth/me",{headers:authHeaders()});
    if(!res.ok){authToken=null;localStorage.removeItem("hoplist_token");showAuthScreen();return;}
    var data=await res.json();
    currentUser=data.user;
    hideAuthScreen();
    await syncFromServer();
  }catch(e){
    // Offline — load local data and continue
    hideAuthScreen();
    loadLocal();
  }
}

function showAuthScreen(){document.getElementById("authScreen").style.display="flex";}
function hideAuthScreen(){document.getElementById("authScreen").style.display="none";}

async function doAuth(){
  var email=document.getElementById("authEmail").value.trim();
  var password=document.getElementById("authPassword").value;
  var isLogin=document.getElementById("loginTab").classList.contains("active");
  var errEl=document.getElementById("authError");
  var btn=document.getElementById("authSubmit");
  errEl.classList.remove("show");
  if(!email||!password){errEl.textContent="Please fill in all fields.";errEl.classList.add("show");return;}
  btn.disabled=true;btn.textContent=isLogin?"Signing in…":"Creating account…";
  try{
    var res=await fetch(BACKEND+"/auth/"+(isLogin?"login":"register"),{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({email,password})});
    var data=await res.json();
    if(!res.ok){errEl.textContent=data.error||"Something went wrong";errEl.classList.add("show");return;}
    authToken=data.token;currentUser=data.user;
    localStorage.setItem("hoplist_token",authToken);
    if(!isLogin){
      // New registration — migrate any pre-existing local places to this new account
      var localData=loadLocal();
      if(localData&&(localData.places.length>0||localData.collections.length>0)){
        places=localData.places;collections=localData.collections;
        await pushToServer();
      } else {
        places=[];collections=[];
      }
    } else {
      // Login — always load from server, never use local data from another account
      places=[];collections=[];
      await syncFromServer();
    }
    hideAuthScreen();
    renderList();renderCollections();
    showToast("auth","ts","Welcome"+(isLogin?" back":"")+", "+currentUser.email.split("@")[0]+"! ✈","");
    // If came from collab invite
    if(window._pendingCollabToken){
      var ct=window._pendingCollabToken;window._pendingCollabToken=null;
      setTimeout(function(){openCollabPage(ct);},600);
    }
    // If came from share page to save
    if(window._pendingSaveShare){
      currentShareData=window._pendingSaveShare;
      window._pendingSaveShare=null;
      setTimeout(saveSharedCollection,600);
    }
  }catch(e){
    errEl.textContent="Connection error. Check your internet.";errEl.classList.add("show");
  }finally{btn.disabled=false;btn.textContent=isLogin?"Sign In":"Create Account";}
}

function save(){
  // Save locally always
  try{localStorage.setItem("hoplist_v8",JSON.stringify({places:places,collections:collections}));}catch(e){}
  // Debounce server sync
  if(authToken){clearTimeout(syncTimeout);syncTimeout=setTimeout(pushToServer,1500);}
}

function loadLocal(){
  try{
    var d=localStorage.getItem("hoplist_v8")||localStorage.getItem("roamy_v8");if(d){var p=JSON.parse(d);return{places:Array.isArray(p)?p:(p.places||[]),collections:p.collections||[]};}
    var d7=localStorage.getItem("roamy_v7");if(d7){var p7=JSON.parse(d7);return{places:Array.isArray(p7)?p7:(p7.places||[]),collections:[]};}
    var d6=localStorage.getItem("roamy_v6");if(d6){var p6=JSON.parse(d6);return{places:Array.isArray(p6)?p6:(p6.places||[]),collections:[]};}
  }catch(e){}
  return{places:[],collections:[]};
}

function load(){
  var data=loadLocal();
  places=data.places;collections=data.collections;
}

async function syncFromServer(){
  if(!authToken)return;
  // If a push is pending, flush it first so we don't overwrite local changes
  if(syncTimeout){
    clearTimeout(syncTimeout);
    syncTimeout=null;
    await pushToServer();
  }
  try{
    setSyncing(true);
    var res=await fetch(BACKEND+"/sync",{headers:authHeaders()});
    if(!res.ok)return;
    var data=await res.json();
    places=data.places||[];
    collections=data.collections||[];
    try{localStorage.setItem("hoplist_v8",JSON.stringify({places,collections}));}catch(e){}
    setSyncing(false);
    renderList();renderCollections();if(mapInited)renderMapMarkers();
  }catch(e){setSyncing(false);}
}

async function pushToServer(){
  if(!authToken)return;
  try{
    setSyncing(true);
    await fetch(BACKEND+"/sync",{method:"POST",headers:authHeaders(),body:JSON.stringify({places,collections})});
    setSyncing(false);
  }catch(e){setSyncing(false);}
}

  document.getElementById("userMenu").style.display="none";
  showToast("sync","tl","Syncing…","");
  await syncFromServer();

}

// ── UNIVERSAL SWIPE TO DISMISS ─────────────────────────────────────────────
function enableSwipeDismiss(overlayId, dismissFn){
  var overlay=document.getElementById(overlayId);
  if(!overlay)return;
  var sheet=overlay.querySelector(".bsheet,.sheet,.picker");
  var handle=overlay.querySelector(".bsheet-handle,#sheetHandleZone,.picker-handle");
  if(!sheet||!handle)return;

  var startY=0,lastY=0,startT=0,dragging=false;

  handle.addEventListener("touchstart",function(e){
    startY=e.touches[0].clientY;
    lastY=startY;startT=Date.now();dragging=true;
    sheet.style.transition="none";
  },{passive:true});

  handle.addEventListener("touchmove",function(e){
    if(!dragging)return;
    var y=e.touches[0].clientY;
    var delta=y-startY;lastY=y;
    if(delta>0){
      sheet.style.transform="translateY("+delta+"px)";
      var opacity=Math.max(0,0.5-delta/500);
      overlay.style.background="rgba(15,23,42,"+opacity+")";
    }
  },{passive:true});

  handle.addEventListener("touchend",function(){
    if(!dragging)return;dragging=false;
    var delta=lastY-startY;
    var velocity=delta/(Date.now()-startT);
    sheet.style.transition="";overlay.style.background="";
    if(delta>110||velocity>0.4){
      sheet.style.transform="translateY(100%)";
      sheet.style.transition="transform 0.28s cubic-bezier(0.4,0,1,1)";
      setTimeout(dismissFn,280);
    } else {
      sheet.style.transform="translateY(0)";
      sheet.style.transition="transform 0.3s cubic-bezier(0.16,1,0.3,1)";
      setTimeout(function(){sheet.style.transform="";sheet.style.transition="";},300);
    }
  },{passive:true});
}

function getCatColor(type){
  if(!type)return CATEGORY_COLORS.default;
  if(CATEGORY_COLORS[type.toLowerCase()])return CATEGORY_COLORS[type.toLowerCase()];
  var colors=["#6366F1","#EC4899","#14B8A6","#F97316","#8B5CF6","#06B6D4","#84CC16","#EF4444"];
  var hash=0;for(var i=0;i<type.length;i++)hash=type.charCodeAt(i)+((hash<<5)-hash);
  return colors[Math.abs(hash)%colors.length];
}

// ── DATE HELPERS ───────────────────────────────────────────────────────────
function formatDateRange(s,e){
  if(!s)return null;
  var opts={month:"short",day:"numeric"};
  var sd=new Date(s+"T12:00:00");var ed=e?new Date(e+"T12:00:00"):null;
  var str=sd.toLocaleDateString("en-US",opts);
  if(ed&&e!==s)str+=" – "+ed.toLocaleDateString("en-US",{month:sd.getMonth()===ed.getMonth()?"numeric":"short",day:"numeric"});
  return str;
}
function getCountdown(s,e){
  if(!s)return null;
  var now=new Date();now.setHours(0,0,0,0);
  var start=new Date(s+"T12:00:00");start.setHours(0,0,0,0);
  var end=e?new Date(e+"T12:00:00"):start;end.setHours(0,0,0,0);
  var msDay=86400000;
  if(now<start){var d=Math.round((start-now)/msDay);return"In "+d+" day"+(d!==1?"s":"");}
  if(now<=end){var d2=Math.round((end-now)/msDay);return d2===0?"Last day!":"Ongoing · "+d2+"d left";}
  var d3=Math.round((now-end)/msDay);return d3===0?"Just finished":""+d3+" day"+(d3!==1?"s":"")+" ago";
}

var sectionCollapsed={};

var activeSecId=null;

function renderColDetailPlaces(col){
  if(!col)col=collections.find(function(c){return c.id===currentColId;});
  if(!col)return;
  var ps=getColPlaces(col);
  var sections=col.sections||[];
  var sectionMap=col.sectionMap||{};
  var allSectionedIds=Object.values(sectionMap).flat();
  var unsorted=ps.filter(function(p){return!allSectionedIds.includes(p.id);});
  var hasSections=sections.length>0;
  var accentColor=col.color||"var(--blue)";
  if(!activeSecId||(activeSecId!=="__all"&&activeSecId!=="__unsorted"&&!sections.find(function(s){return s.id===activeSecId;}))){activeSecId="__all";}
  var tabsEl=document.getElementById("colDetailSections");
  if(!tabsEl)return;
  if(ps.length===0&&!hasSections){
    tabsEl.innerHTML="";
    document.getElementById("colDetailPlaces").innerHTML='<div class="empty" style="padding-top:40px"><div class="empty-icon">📍</div><div class="empty-title">No places yet</div><div class="empty-sub">Add places using the 🗂️ Collect button on any place</div></div>';
    return;
  }
  var tabsHtml='<div class="sec-tabs-wrap"><div class="sec-tabs">';
  if(hasSections){
    tabsHtml+='<button class="sec-tab'+(activeSecId==="__all"?" active":"")+'" onclick="switchTab(\'__all\')">All <span class="sec-tab-count">'+ps.length+'</span></button>';
    sections.forEach(function(sec){
      var cnt=(sectionMap[sec.id]||[]).length;
      tabsHtml+='<button class="sec-tab'+(activeSecId===sec.id?" active":"")+'" onclick="switchTab(\''+sec.id+'\')">'+sec.name+' <span class="sec-tab-count">'+cnt+'</span><span class="sec-tab-edit" onclick="event.stopPropagation();openSecModal(\''+sec.id+'\')">✏️</span></button>';
    });
    if(unsorted.length>0){tabsHtml+='<button class="sec-tab'+(activeSecId==="__unsorted"?" active":"")+'" onclick="switchTab(\'__unsorted\')">Unsorted <span class="sec-tab-count">'+unsorted.length+'</span></button>';}
    tabsHtml+='<button class="sec-add-tab" onclick="openNewSecModal()">＋</button>';
  }
  tabsHtml+='</div></div>';
  tabsEl.innerHTML=tabsHtml;
  setTimeout(function(){var at=tabsEl.querySelector(".sec-tab.active");if(at)at.scrollIntoView({inline:"center",behavior:"smooth"});},50);
  var contentPlaces=[];
  if(!hasSections||activeSecId==="__all")contentPlaces=ps;
  else if(activeSecId==="__unsorted")contentPlaces=unsorted;
  else{var sids=sectionMap[activeSecId]||[];contentPlaces=sids.map(function(id){return ps.find(function(p){return p.id===id;});}).filter(Boolean);}
  var listEl=document.getElementById("colDetailPlaces");
  var html="";
  var secCtx=(hasSections&&activeSecId!=="__all"&&activeSecId!=="__unsorted")?activeSecId:null;
  contentPlaces.forEach(function(p){html+=renderColPlaceCard(p,secCtx,accentColor);});
  if(secCtx){html+='<button class="sec-add-place-btn" onclick="assignPlaceToSection(\''+secCtx+'\')">＋ Add place to this section</button>';}
  if(!hasSections){html+='<button style="display:flex;align-items:center;gap:8px;padding:10px 16px;color:var(--gray-400);font-size:13px;cursor:pointer;border:none;background:transparent;font-family:Inter,sans-serif;width:100%" onclick="openNewSecModal()">＋ Add sections</button>';}
  listEl.innerHTML=html||'<div class="empty" style="padding-top:32px"><div class="empty-icon">📍</div><div class="empty-title">Empty section</div><div class="empty-sub">Tap + to add places</div></div>';
}

function renderColPlaceCard(p,secId,accentColor){

  var vtag=p.visited?'<span class="pvis-tag">✓</span>':"";

  // Collab places can be removed by who added them or owner
  var isOwner=collabData&&currentUser&&collabData.ownerId===currentUser.id;
  var isAdder=p.addedByName&&currentUser&&(isOwner||(p.addedById&&p.addedById===currentUser.id));
  var removeBtn=p.addedByName&&isAdder?'<button onclick="event.stopPropagation();removeCollabPlace(\''+p.id+'\')" style="padding:5px 9px;background:var(--gray-100);border:none;border-radius:8px;color:var(--gray-400);font-size:12px;cursor:pointer;flex-shrink:0;margin-right:4px">✕</button>':"";

}

function openNewSecModal(){

  var html='<div class="modal-overlay" id="secModal" onclick="closeSecModal(event)">'+
    '<div class="bsheet">'+
    '<div class="bsheet-handle"><div class="bsheet-handle-bar"></div></div>'+

    '<div class="modal-btns"><button class="mbtn secondary" onclick="document.getElementById(\'secModal\').remove()">Cancel</button><button class="mbtn primary" onclick="saveNewSection()">Add</button></div>'+
    '</div></div></div>';
  document.body.insertAdjacentHTML("beforeend",html);
  pushBackState("secModal");
  enableSwipeDismiss("secModal",function(){document.getElementById("secModal")?.remove();});

function openSecModal(secId){
  var col=collections.find(function(c){return c.id===currentColId;});if(!col)return;
  var sec=(col.sections||[]).find(function(s){return s.id===secId;});if(!sec)return;
  var ex=document.getElementById("secModal");if(ex)ex.remove();
  var html='<div class="modal-overlay" id="secModal" onclick="closeSecModal(event)">'+
    '<div class="bsheet">'+
    '<div class="bsheet-handle"><div class="bsheet-handle-bar"></div></div>'+
    '<div class="bsheet-pad"><div class="bsheet-title">Edit Section</div>'+
    '<input class="modal-input" id="secNameInput" placeholder="Section name…" value="'+sec.name+'"/>'+
    '<div class="modal-btns"><button class="mbtn secondary" style="color:var(--red)" onclick="deleteSection(\''+secId+'\')">Delete</button><button class="mbtn primary" onclick="renameSection(\''+secId+'\')">Save</button></div>'+
    '</div></div></div>';
  document.body.insertAdjacentHTML("beforeend",html);
  pushBackState("secModal");
  enableSwipeDismiss("secModal",function(){document.getElementById("secModal")?.remove();});
}

function closeSecModal(e){if(e.target.id==="secModal")document.getElementById("secModal").remove();}

function saveNewSection(){
  var name=document.getElementById("secNameInput")?.value.trim();if(!name)return;
  var col=collections.find(function(c){return c.id===currentColId;});if(!col)return;
  var secId="sec"+Date.now();
  var sections=(col.sections||[]).concat([{id:secId,name:name}]);
  var sectionMap=Object.assign({},col.sectionMap||{});sectionMap[secId]=[];
  collections=collections.map(function(c){return c.id===currentColId?Object.assign({},c,{sections:sections,sectionMap:sectionMap}):c;});
  save();document.getElementById("secModal")?.remove();
  renderColDetailPlaces();
  if(currentCollabToken)patchCollabState();
}

function renameSection(secId){
  var name=document.getElementById("secNameInput")?.value.trim();if(!name)return;
  var col=collections.find(function(c){return c.id===currentColId;});if(!col)return;
  var sections=(col.sections||[]).map(function(s){return s.id===secId?Object.assign({},s,{name:name}):s;});
  collections=collections.map(function(c){return c.id===currentColId?Object.assign({},c,{sections:sections}):c;});
  save();document.getElementById("secModal")?.remove();
  renderColDetailPlaces();
  if(currentCollabToken)patchCollabState();
}

function deleteSection(secId){
  var col=collections.find(function(c){return c.id===currentColId;});if(!col)return;
  var sections=(col.sections||[]).filter(function(s){return s.id!==secId;});
  var sectionMap=Object.assign({},col.sectionMap||{});
  delete sectionMap[secId];
  collections=collections.map(function(c){return c.id===currentColId?Object.assign({},c,{sections:sections,sectionMap:sectionMap}):c;});
  save();document.getElementById("secModal")?.remove();
  renderColDetailPlaces();
  if(currentCollabToken)patchCollabState();
}

// ── MOVE PLACE TO SECTION ──────────────────────────────────────────────────
function moveToSection(placeId,currentSecId){
  var col=collections.find(function(c){return c.id===currentColId;});if(!col)return;
  var sections=col.sections||[];
  if(sections.length===0){openNewSecModal();return;}
  var ex=document.getElementById("moveSec");if(ex)ex.remove();
  var items=sections.map(function(sec){
    var isCurrent=currentSecId===sec.id;
    return'<div style="display:flex;align-items:center;gap:12px;padding:13px 16px;border-bottom:1px solid var(--gray-100);cursor:pointer;'+(isCurrent?"background:var(--blue-light)":"")+'" onclick="doMoveToSection(\''+placeId+'\',\''+currentSecId+'\',\''+sec.id+'\')">'+
      '<div style="flex:1;font-size:14px;font-weight:600;color:var(--gray-900)">'+sec.name+'</div>'+
      (isCurrent?'<span style="color:var(--blue);font-size:13px">Current</span>':'<span style="color:var(--gray-400);font-size:13px">Move here</span>')+
      '</div>';
  }).join('');
  var removeRow=currentSecId?'<div style="display:flex;align-items:center;gap:12px;padding:13px 16px;cursor:pointer" onclick="doMoveToSection(\''+placeId+'\',\''+currentSecId+'\',null)"><div style="flex:1;font-size:14px;font-weight:600;color:var(--gray-500)">Remove from section</div></div>':'';
  var html='<div class="modal-overlay" id="moveSec" onclick="this.id===\'moveSec\'&&this.remove()"><div class="modal" style="padding:0;overflow:hidden">'+
    '<div style="padding:20px 16px 14px"><div class="modal-handle" style="margin:0 auto 16px"></div><div style="font-size:17px;font-weight:700;color:var(--gray-900)">Move to Section</div></div>'+
    '<div style="max-height:50vh;overflow-y:auto">'+items+removeRow+'</div>'+
    '<div style="padding:14px 16px"><button class="mbtn secondary" style="width:100%" onclick="document.getElementById(\'moveSec\').remove()">Cancel</button></div>'+
    '</div></div>';
  document.body.insertAdjacentHTML("beforeend",html);
  pushBackState("moveSec");
}

function doMoveToSection(placeId,fromSecId,toSecId){
  var col=collections.find(function(c){return c.id===currentColId;});if(!col)return;
  var sectionMap=JSON.parse(JSON.stringify(col.sectionMap||{}));
  // Remove from current section
  if(fromSecId&&sectionMap[fromSecId]){sectionMap[fromSecId]=sectionMap[fromSecId].filter(function(id){return id!==placeId;});}
  // Add to new section
  if(toSecId){if(!sectionMap[toSecId])sectionMap[toSecId]=[];if(!sectionMap[toSecId].includes(placeId))sectionMap[toSecId].push(placeId);}
  collections=collections.map(function(c){return c.id===currentColId?Object.assign({},c,{sectionMap:sectionMap}):c;});
  save();document.getElementById("moveSec")?.remove();
  renderColDetailPlaces();
  if(currentCollabToken)patchCollabState();
}

function assignPlaceToSection(secId){
  var col=collections.find(function(c){return c.id===currentColId;});if(!col)return;
  var sectionMap=col.sectionMap||{};
  var sectionedIds=Object.values(sectionMap).flat();
  var unsorted=getColPlaces(col).filter(function(p){return!sectionedIds.includes(p.id);});
  if(unsorted.length===0){showToast("sec","te","No unsorted places","All places are already in sections");return;}
  var ex=document.getElementById("moveSec");if(ex)ex.remove();
  var items=unsorted.map(function(p){
    return'<div style="display:flex;align-items:center;gap:12px;padding:13px 16px;border-bottom:1px solid var(--gray-100);cursor:pointer" onclick="doMoveToSection(\''+p.id+'\',null,\''+secId+'\')">'+
      '<div style="font-size:20px">'+emo(p.type)+'</div>'+
      '<div style="flex:1"><div style="font-size:14px;font-weight:600;color:var(--gray-900)">'+p.name+'</div><div style="font-size:12px;color:var(--gray-400)">'+(p.city||"")+(p.country?", "+p.country:"")+'</div></div>'+
      '</div>';
  }).join('');
  var html='<div class="modal-overlay" id="moveSec" onclick="this.id===\'moveSec\'&&this.remove()"><div class="modal" style="padding:0;overflow:hidden">'+
    '<div style="padding:20px 16px 14px"><div class="modal-handle" style="margin:0 auto 16px"></div><div style="font-size:17px;font-weight:700;color:var(--gray-900)">Add to section</div></div>'+
    '<div style="max-height:50vh;overflow-y:auto">'+items+'</div>'+
    '<div style="padding:14px 16px"><button class="mbtn secondary" style="width:100%" onclick="document.getElementById(\'moveSec\').remove()">Cancel</button></div>'+
    '</div></div>';
  document.body.insertAdjacentHTML("beforeend",html);
  pushBackState("moveSec");
}

  var ex=document.getElementById("dateModal");if(ex)ex.remove();
  var html='<div class="modal-overlay" id="dateModal" onclick="this.id===\'dateModal\'&&this.remove()">'+

function saveDates(){

  var col=collections.find(function(c){return c.id===currentColId;});if(!col)return;
  var sections=col.sections||[];
  var sectionMap=col.sectionMap||{};
  // Auto-create day sections if none exist and dates are set
  if(start&&end&&sections.length===0){
    var d1=new Date(start+"T12:00:00");var d2=new Date(end+"T12:00:00");
    var numDays=Math.min(Math.round((d2-d1)/86400000)+1,14);
    sections=[];sectionMap={};
    for(var i=0;i<numDays;i++){
      var d=new Date(d1.getTime()+i*86400000);
      var label="Day "+(i+1)+" · "+d.toLocaleDateString("en-US",{month:"short",day:"numeric"});
      var sid="sec"+Date.now()+i;
      sections.push({id:sid,name:label});sectionMap[sid]=[];
    }
  }
  collections=collections.map(function(c){return c.id===currentColId?Object.assign({},c,{startDate:start,endDate:end,sections:sections,sectionMap:sectionMap}):c;});
  save();document.getElementById("dateModal")?.remove();

async function saveCol(){
  var name=document.getElementById("colNameInput").value.trim();
  if(!name)return;
  var btn=document.querySelector("#colModal .mbtn.primary");
  if(btn){btn.disabled=true;btn.textContent="Saving…";}
  var startDate=document.getElementById("colStartDate")?.value||"";
  var endDate=document.getElementById("colEndDate")?.value||"";
  var colId=editingColId||('col'+Date.now());
  var existingCol=editingColId?collections.find(function(c){return c.id===editingColId;}):null;
  // Auto-create day sections when dates are newly added
  var sections=existingCol?.sections||[];
  var sectionMap=existingCol?.sectionMap||{};
  var hadDates=existingCol?.startDate&&existingCol?.endDate;
  if(startDate&&endDate&&!hadDates&&sections.length===0){
    var d1=new Date(startDate);var d2=new Date(endDate);
    var dayMs=86400000;var numDays=Math.round((d2-d1)/dayMs)+1;
    numDays=Math.min(numDays,14);
    sections=[];
    for(var i=0;i<numDays;i++){
      var d=new Date(d1.getTime()+i*dayMs);
      var label="Day "+(i+1)+" · "+d.toLocaleDateString("en-US",{month:"short",day:"numeric"});
      var sid="sec"+Date.now()+i;
      sections.push({id:sid,name:label});
      sectionMap[sid]=[];
    }
  }
  var updatedCol={
    id:colId,name:name,emoji:selectedEmoji,color:selectedColor,
    placeIds:existingCol?existingCol.placeIds:[],
    sections:sections,sectionMap:sectionMap,
    startDate:startDate,endDate:endDate,
    createdAt:existingCol?existingCol.createdAt:new Date().toISOString(),
    aiCover:existingCol?.aiCover||null
  };
  if(editingColId){
    collections=collections.map(function(c){return c.id===editingColId?updatedCol:c;});
  } else {
    collections.push(updatedCol);
  }
  save();
  document.getElementById("colModal").remove();
  renderCollections();
  if(editingColId&&currentColId===editingColId)openColDetail(editingColId);
  generateCoverForCol(colId);
}

async function generateCoverForCol(colId){
  var col=collections.find(function(c){return c.id===colId;});
  if(!col||!authToken)return;
  var ps=getColPlaces(col);
  console.log("Generating AI cover for:", col.name);
  try{
    var res=await fetch(BACKEND+"/generate-cover",{
      method:"POST",
      headers:authHeaders(),
      body:JSON.stringify({collectionName:col.name,places:ps.map(function(p){return{name:p.name,city:p.city,country:p.country,type:p.type};}),emoji:col.emoji})
    });
    var data=await res.json();
    if(data.imageUrl){
      collections=collections.map(function(c){return c.id===colId?Object.assign({},c,{aiCover:data.imageUrl}):c;});
      save();renderCollections();

function colPickerToggle(colId){
  colPickerState[colId]=!colPickerState[colId];
  // Update UI in place without re-rendering whole modal
  var items=document.querySelectorAll("#addToColModal .col-picker-item");
  var colIds=collections.map(function(c){return c.id;});
  var idx=colIds.indexOf(colId);
  if(idx>=0&&items[idx]){
    var selected=colPickerState[colId];
    items[idx].classList.toggle("in-col",selected);
    var check=items[idx].querySelector(".col-picker-check");
    if(check)check.textContent=selected?"✓":"";
  }
}

function saveColPicker(){
  var placeId=colPickerPlaceId;
  if(!placeId){document.getElementById("addToColModal")?.remove();return;}
  document.getElementById("addToColModal")?.remove();

  var regularChanged=[];
  var collabAdds=[]; // {token, place} for collab collections

  collections.forEach(function(col){
    var wasIn=(col.placeIds||[]).includes(placeId);
    var nowIn=!!colPickerState[col.id];
    if(wasIn===nowIn)return;

    if(nowIn&&col.isCollab&&col.collabToken){
      // Collab collection — must go through collab API, not placeIds
      var place=places.find(function(p){return p.id===placeId;});
      if(place)collabAdds.push({token:col.collabToken,place:place,colId:col.id});
    } else {
      // Regular collection — update placeIds normally
      regularChanged.push(col.id);
      collections=collections.map(function(c){
        if(c.id!==col.id)return c;
        var newIds=nowIn?(c.placeIds||[]).concat([placeId]):(c.placeIds||[]).filter(function(id){return id!==placeId;});
        return Object.assign({},c,{placeIds:newIds});
      });
    }
  });

  // Save regular collection changes immediately
  if(regularChanged.length>0){
    try{localStorage.setItem("hoplist_v8",JSON.stringify({places,collections}));}catch(e){}
    if(authToken){clearTimeout(syncTimeout);pushToServer();}
    renderList();renderCollections();
    showToast("col","ts","Added to "+regularChanged.length+" collection"+(regularChanged.length>1?"s":"")+"!","");
    regularChanged.forEach(function(colId){setTimeout(function(){generateCoverForCol(colId);},500);});
  }

  // Post collab places to server via collab API
  if(collabAdds.length>0){
    collabAdds.forEach(function(item){
      var p=item.place;
      fetch(BACKEND+"/collab/"+item.token+"/places",{
        method:"POST",headers:authHeaders(),
        body:JSON.stringify({place:{name:p.name,type:p.type,lat:p.lat,lng:p.lng,city:p.city,country:p.country,photoUrl:p.photoUrl,rating:p.rating}})
      }).then(function(r){return r.json();}).then(function(data){
        if(data.success){
          showToast("col","ts","Added to collaborative collection!","");
          // If this collab collection is currently open, refresh it
          if(currentCollabToken===item.token)refreshCollabDetail();
        }
      }).catch(function(){showToast("col","te","Failed to add to collab collection","");});
    });
  }

  if(regularChanged.length===0&&collabAdds.length===0){
    showToast("col","ts","No changes","");
  }
}

async function joinCollabCollection(){
  if(!authToken){
    window._pendingCollabToken=currentCollabToken;
    closeCollabPage();
    showAuthScreen();
    return;
  }
  var data=collabData;if(!data)return;
  var col=data.collection;
  // Check already joined
  if(collections.some(function(c){return c.collabToken===currentCollabToken;})){
    showToast("collab","ts","Already joined!","Find it in your Collections tab");
    closeCollabPage();return;
  }
  // Add as a collaborative collection locally
  var colId="collab_"+currentCollabToken;
  var newCol=Object.assign({},col,{
    id:colId,
    collabToken:currentCollabToken,
    isCollab:true,
    ownerId:data.ownerId,
    placeIds:[],
    sections:[],sectionMap:{},
    createdAt:new Date().toISOString()
  });
  collections.push(newCol);
  try{localStorage.setItem("hoplist_v8",JSON.stringify({places,collections}));}catch(e){}
  fetch(BACKEND+"/sync",{method:"POST",headers:authHeaders(),body:JSON.stringify({places,collections})}).catch(function(){});
  closeCollabPage();
  // Navigate to collections
  document.querySelectorAll(".nav-btn").forEach(function(b){b.classList.remove("active");});
  document.querySelectorAll(".page").forEach(function(p){p.classList.remove("active");});
  document.querySelector('[data-page="collectionsPage"]').classList.add("active");
  document.getElementById("collectionsPage").classList.add("active");
  renderCollections();
  showToast("collab","ts","Joined! "+col.name,"Find it in your Collections tab");
}

function initCollabMap(pts){
  var collabMap=new google.maps.Map(document.getElementById("collabMap"),{zoom:2,center:{lat:20,lng:10},gestureHandling:"cooperative",streetViewControl:false,mapTypeControl:false,fullscreenControl:false,zoomControl:false});
  var bounds=new google.maps.LatLngBounds();
  pts.filter(function(p){return p.lat&&p.lng;}).forEach(function(p){
    var color=getCatColor(p.type);
    var svg='<svg xmlns="http://www.w3.org/2000/svg" width="22" height="28"><circle cx="11" cy="11" r="9" fill="'+color+'" stroke="white" stroke-width="2"/><circle cx="11" cy="11" r="3.5" fill="white" opacity="0.9"/><line x1="11" y1="20" x2="11" y2="28" stroke="'+color+'" stroke-width="2" stroke-linecap="round"/></svg>';
    var icon={url:'data:image/svg+xml;charset=UTF-8,'+encodeURIComponent(svg),scaledSize:new google.maps.Size(22,28),anchor:new google.maps.Point(11,28)};
    new google.maps.Marker({position:{lat:p.lat,lng:p.lng},map:collabMap,icon:icon,title:p.name});
    bounds.extend({lat:p.lat,lng:p.lng});
  });
  if(!bounds.isEmpty())collabMap.fitBounds(bounds,{top:20,right:20,bottom:20,left:20});
}

function closeCollabPage(){
  document.getElementById("collabPage").classList.remove("open");
  currentCollabToken=null;collabData=null;
}

var collabPickerSelected={};

function openCollabAddPicker(){
  var token=currentCollabToken;
  if(!token&&currentColId){
    var col=collections.find(function(c){return c.id===currentColId;});
    if(col&&col.collabToken)token=col.collabToken;
  }
  if(!token){showToast("collab","te","Not a collab collection","");return;}
  currentCollabToken=token;
  if(!authToken){window._pendingCollabToken=token;showAuthScreen();return;}
  if(places.length===0){showToast("collab","te","No saved places","Add places to Hoplist first");return;}
  var ex=document.getElementById("collabAddModal");if(ex)ex.remove();
  collabPickerSelected={};
  var alreadyNames=(collabData&&collabData.collabPlaces||[]).map(function(p){return p.name;});
  var items=places.map(function(p){
    var already=alreadyNames.includes(p.name);
    return'<div class="col-picker-item'+(already?" in-col":"")+'" id="cpick-'+p.id+'" onclick="'+(already?"":"toggleCollabPick('"+p.id+"')")+'" style="'+(already?"opacity:0.5;cursor:default":"")+'">' +
      '<div class="col-picker-emoji">'+emo(p.type)+'</div>'+
      '<div class="col-picker-name">'+p.name+'</div>'+
      '<div class="col-picker-count">'+(p.city||"")+'</div>'+
      '<div class="col-picker-check" id="cpick-check-'+p.id+'">'+(already?"✓":"")+'</div>'+
      '</div>';
  }).join('');
  var html='<div class="modal-overlay" id="collabAddModal" onclick="this.id===\'collabAddModal\'&&this.remove()">'+
    '<div class="bsheet"><div class="bsheet-handle"><div class="bsheet-handle-bar"></div></div>'+
    '<div class="bsheet-pad"><div class="bsheet-title">Add your places</div>'+
    '<div style="font-size:13px;color:var(--gray-500);margin-bottom:12px">Select places then tap Done</div>'+
    '<div class="col-picker-list">'+items+'</div>'+
    '<div class="modal-btns">'+
    '<button class="mbtn secondary" onclick="document.getElementById(\'collabAddModal\').remove()">Cancel</button>'+
    '<button class="mbtn primary" onclick="submitCollabPick()">Done</button>'+
    '</div></div></div></div>';
  document.body.insertAdjacentHTML("beforeend",html);
  enableSwipeDismiss("collabAddModal",function(){document.getElementById("collabAddModal")?.remove();});
}

function toggleCollabPick(placeId){
  collabPickerSelected[placeId]=!collabPickerSelected[placeId];
  var item=document.getElementById("cpick-"+placeId);
  var check=document.getElementById("cpick-check-"+placeId);
  if(item)item.classList.toggle("in-col",!!collabPickerSelected[placeId]);
  if(check)check.textContent=collabPickerSelected[placeId]?"✓":"";
}

async function submitCollabPick(){
  var ids=Object.keys(collabPickerSelected).filter(function(id){return collabPickerSelected[id];});
  if(!ids.length){document.getElementById("collabAddModal")?.remove();return;}
  document.getElementById("collabAddModal")?.remove();
  showToast("collab","tl","Adding "+ids.length+" place"+(ids.length!==1?"s":"")+"…","");
  try{
    for(var i=0;i<ids.length;i++){
      var place=places.find(function(p){return p.id===ids[i];});
      if(!place)continue;
      await fetch(BACKEND+"/collab/"+currentCollabToken+"/places",{method:"POST",headers:authHeaders(),body:JSON.stringify({place:{name:place.name,type:place.type,lat:place.lat,lng:place.lng,city:place.city,country:place.country,photoUrl:place.photoUrl,rating:place.rating}})});
    }
    hideToast("collab");
    showToast("collab","ts","Added "+ids.length+" place"+(ids.length!==1?"s":"")+"!","");
    await refreshCollabDetail();
  }catch(e){hideToast("collab");showToast("collab","te","Failed",e.message);}
}

async function addPlaceToCollab(placeId){toggleCollabPick(placeId);}

async function removeCollabPlace(placeId){
  try{
    await fetch(BACKEND+"/collab/"+currentCollabToken+"/places/"+placeId,{method:"DELETE",headers:authHeaders()});
    await refreshCollabDetail();
  }catch(e){showToast("collab","te","Failed","");}
}

function shareCollectionById(colId){currentColId=colId;shareCollection();}

function buildShareUrl(col){
  var ps=getColPlaces(col);
  var data={n:col.name,e:col.emoji,p:ps.map(function(p){return{n:p.name,t:p.type||"default",la:Math.round((p.lat||0)*10000)/10000,lo:Math.round((p.lng||0)*10000)/10000,ci:p.city||"",co:p.country||"",ph:p.photoUrl||"",r:p.rating||null};})};
  return window.location.origin+"/?share="+btoa(unescape(encodeURIComponent(JSON.stringify(data))));
}

function buildGoogleMapsUrl(col){
  var ps=getColPlaces(col).filter(function(p){return p.lat&&p.lng;});
  if(ps.length===0)return null;
  if(ps.length===1)return"https://www.google.com/maps/search/?api=1&query="+encodeURIComponent(ps[0].name+", "+ps[0].city);
  return"https://www.google.com/maps/dir/"+ps.map(function(p){return p.lat+","+p.lng;}).join("/");
}

async function copyShareLink(){
  var col=collections.find(function(c){return c.id===currentColId;});if(!col)return;
  var ps=getColPlaces(col);
  var data={n:col.name,e:col.emoji,p:ps.map(function(p){return{n:p.name,t:p.type||"default",la:Math.round((p.lat||0)*10000)/10000,lo:Math.round((p.lng||0)*10000)/10000,ci:p.city||"",co:p.country||"",ph:p.photoUrl||"",r:p.rating||null};})};
  document.getElementById("shareModal")?.remove();
  showToast("share","tl","Creating link…","");
  try {
    var res=await fetch(BACKEND+"/share",{method:"POST",headers:authHeaders(),body:JSON.stringify({data})});
    var result=await res.json();
    if(!result.success)throw new Error("Failed");
    var url=result.url;
    hideToast("share");
    if(navigator.share){
      navigator.share({title:col.emoji+" "+col.name,url:url}).catch(function(){});
    } else {
      navigator.clipboard.writeText(url).then(function(){
        showToast("share","ts","Link copied!","Short link — works every time");
      }).catch(function(){
        var ta=document.createElement("textarea");ta.value=url;document.body.appendChild(ta);ta.select();document.execCommand("copy");document.body.removeChild(ta);
        showToast("share","ts","Link copied!","");
      });
    }
  } catch(e) {
    hideToast("share");
    showToast("share","te","Failed","Check your connection");
  }
}

function openGoogleMaps(){
  var col=collections.find(function(c){return c.id===currentColId;});if(!col)return;
  var url=buildGoogleMapsUrl(col);if(!url)return;
  document.getElementById("shareModal")?.remove();
  window.open(url,"_blank");
}

async function sendInvite(){

  if(!email){showToast("inv","te","Enter an email","");return;}
  if(!authToken){showToast("inv","te","Sign in required","");return;}
  try{
