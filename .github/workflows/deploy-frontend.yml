name: Deploy Frontend to EdgeOne Pages

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to EdgeOne Pages
        run: npx edgeone pages deploy frontend -n roamyclone -t ${{ secrets.EDGEONE_API_TOKEN }}
